<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>DeadDance — the calendar & map of every Dead & jam show</title>
<meta property="og:type" content="website">
<meta property="og:site_name" content="DeadDance">
<meta property="og:title" content="DeadDance 🌹 — every Dead & jam show, one calendar & map">
<meta property="og:description" content="Tap or scan the Steal Your Face to enter. Free. Find your people, find your shows.">
<meta property="og:url" content="https://deaddance.app/">
<meta property="og:image" content="https://deaddance.app/stealie_qr.png">
<meta property="og:image:width" content="2000">
<meta property="og:image:height" content="2000">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="https://deaddance.app/stealie_qr.png">
<style>
  html,body{margin:0;height:100%;background:#0e0b14;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;-webkit-tap-highlight-color:transparent}
  a.wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100%;text-decoration:none;color:inherit;padding:24px 18px;box-sizing:border-box;gap:16px}
  .qr{width:min(78vw,360px);height:auto;background:#fff;border-radius:22px;padding:14px;box-shadow:0 12px 40px #0008}
  h1{font-size:22px;font-weight:900;margin:6px 0 0;text-align:center;letter-spacing:.5px}
  p{margin:0;color:#c9b8e6;font-size:14.5px;text-align:center;max-width:340px;line-height:1.4}
  .cta{margin-top:6px;background:linear-gradient(135deg,#b8002e,#5a2e86);color:#fff;font-weight:900;font-size:16px;border-radius:14px;padding:14px 26px;box-shadow:0 6px 20px #0006}
  .sub{color:#8f7bbf;font-size:12px;margin-top:2px}
</style>
</head>
<body>
  <a class="wrap" href="https://deaddance.app/" rel="noopener">
    <img class="qr" src="../stealie_qr.png" alt="Tap or scan to enter DeadDance">
    <h1>🌹 DEADDANCE</h1>
    <p>The calendar &amp; map of every Grateful Dead &amp; jam-band show. Free. <b>Tap to enter, or scan.</b></p>
    <div class="cta">Enter DeadDance ›</div>
    <div class="sub">deaddance.app</div>
  </a>
  <script>document.addEventListener('click', function(){ try{ location.href='https://deaddance.app/'; }catch(e){} });</script>
</body>
</html>
