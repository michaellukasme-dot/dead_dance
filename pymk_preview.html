<!doctype html><html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>People & Bands you may know · DeadDance</title>
<style>
:root{--rose:#b8002e;--purple:#2a1b3d;--ink:#1a1320;--muted:#7a7285;--line:#ece7f2}
*{box-sizing:border-box}
body{margin:0;background:#f6f4fb;color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
.wrap{max-width:820px;margin:0 auto;padding:18px 12px 40px}
.card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:14px 6px 14px 14px;box-shadow:0 1px 3px rgba(20,10,25,.05)}
.head{display:flex;align-items:center;gap:9px;padding:0 8px 10px 2px}
.head .ic{width:26px;height:26px}
.head h2{font-size:17px;margin:0;font-weight:800}
.head .dots{margin-left:auto;color:var(--muted);font-weight:800;letter-spacing:1px}
.row{display:flex;gap:12px;overflow-x:auto;padding:4px 8px 6px 0;scroll-snap-type:x mandatory}
.row::-webkit-scrollbar{height:0}
.tile{flex:0 0 168px;scroll-snap-align:start;border:1px solid var(--line);border-radius:14px;overflow:hidden;background:#fff;position:relative}
.tile .pic{width:168px;height:168px;object-fit:cover;display:block;background:#eee}
.tile .mono{width:168px;height:168px;display:flex;align-items:center;justify-content:center;font-size:44px;font-weight:900;color:#fff}
.x{position:absolute;top:8px;right:8px;width:30px;height:30px;border-radius:50%;background:rgba(20,10,25,.55);color:#fff;border:0;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.meta{padding:9px 11px 12px}
.nm{font-weight:800;font-size:15px;line-height:1.15;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.kind{font-size:10px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;margin-top:2px}
.kind.band{color:var(--rose)} .kind.person{color:#2f6fe0}
.sub{color:var(--muted);font-size:12px;margin:3px 0 10px;display:flex;align-items:center;gap:5px}
.sub .av{width:16px;height:16px;border-radius:50%;background:#cdbfe0;display:inline-block}
.btn{width:100%;border:0;border-radius:10px;padding:9px;font-weight:800;font-size:14px;cursor:pointer}
.btn.add{background:#fdeef2;color:var(--rose)}
.btn.follow{background:#eef3fd;color:#2f6fe0}
.note{color:var(--muted);font-size:12px;padding:10px 10px 0}
</style></head>
<body><div class="wrap">
  <div class="card">
    <div class="head">
      <img class="ic" src="dd-512.png" alt=""><h2>People &amp; bands you may know</h2><span class="dots">•••</span>
    </div>
    <div class="row" id="row"></div>
    <div class="note">🌹 Design preview. When wired: <b>people</b> come from friends-of-friends (dd_friends), <b>bands</b> from your scene &amp; region (dd_bands), and the count is real shared connections / shared shows.</div>
  </div>
</div>
<script>
var G=['linear-gradient(150deg,#e0577a,#b8002e)','linear-gradient(150deg,#3a2456,#5a2e86)','linear-gradient(150deg,#1f9e6b,#123b28)','linear-gradient(150deg,#d19a2a,#7a4d0c)','linear-gradient(150deg,#2f6fe0,#1b3d7a)'];
function mono(n){return String(n||'').replace(/[^A-Za-z ]/g,'').split(/\s+/).filter(Boolean).slice(0,2).map(function(w){return w[0].toUpperCase();}).join('')||'🌹';}
// Sample suggestions (preview). Real version reads dd_friends + dd_bands + dd_shows.
var SUG=[
 {t:'band',n:'Cubensis',sub:'plays your scene · 3 shared shows'},
 {t:'person',n:'Dave Kessner',sub:'12 mutual friends'},
 {t:'band',n:"Jerry's Middle Finger",sub:'2 friends follow them'},
 {t:'person',n:'Marin Rose',sub:'8 mutual friends'},
 {t:'band',n:'Sages And Spirits',sub:'in your region · Colorado'},
 {t:'person',n:'Cody Reynolds',sub:'5 mutual friends'},
 {t:'band',n:'American Beauty Band',sub:'4 friends follow them'}
];
var row=document.getElementById('row');
row.innerHTML=SUG.map(function(s,i){
  var isB=s.t==='band';
  return '<div class="tile" id="t'+i+'">'+
    '<button class="x" onclick="document.getElementById(\'t'+i+'\').remove()">✕</button>'+
    '<div class="mono" style="background:'+G[i%G.length]+'">'+mono(s.n)+'</div>'+
    '<div class="meta"><div class="nm">'+s.n+'</div>'+
    '<div class="kind '+(isB?'band':'person')+'">'+(isB?'Band':'Deadhead')+'</div>'+
    '<div class="sub"><span class="av"></span>'+s.sub+'</div>'+
    '<button class="btn '+(isB?'follow':'add')+'" onclick="this.textContent=\''+(isB?'Following ✓':'Requested ✓')+'\';this.disabled=true;this.style.opacity=.6">'+(isB?'🌹 Follow':'🌹 Add friend')+'</button>'+
    '</div></div>';
}).join('');
</script>
</body></html>
