<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Band Install — dead.dance</title>
<meta name="theme-color" content="#1a1030">
<style>
:root{--purple:#5a2e86;--gold:#ffd76a;--gold2:#c08a2d;--rose:#b8002e;--muted:#9a8fb0;--line:#2e2148;--panel:#20142f;--green:#2a8a4a}
*{box-sizing:border-box}html,body{overflow-x:hidden;max-width:100%}
body{margin:0;background:#17101f;color:#eee;font:16px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
.top{background:linear-gradient(120deg,#0e0716,#3a1d5e 68%,#b8002e);padding:14px 16px;position:sticky;top:0;z-index:30;box-shadow:0 2px 16px #0008;display:flex;align-items:center;gap:12px}
.top .logo{font-weight:900;font-size:18px}.top .logo span{color:var(--gold)}
.bar{flex:1;height:6px;background:#2a1c40;border-radius:3px;overflow:hidden}
.bar i{display:block;height:100%;background:linear-gradient(90deg,var(--gold2),var(--gold));width:0;transition:width .3s}
.step-n{font-size:11.5px;color:#e0cdf5;white-space:nowrap}
/* split — on a phone the FORM comes first; the showcase collapses below it */
.wrap{display:grid;grid-template-columns:1fr 1fr;gap:0;min-height:calc(100vh - 58px);min-height:calc(100dvh - 58px)}
.left{position:sticky;top:58px;align-self:start;height:calc(100vh - 58px);height:calc(100dvh - 58px);overflow:auto;padding:22px 20px;background:linear-gradient(160deg,#1b1129,#140e20);border-right:1px solid var(--line)}
.right{padding:22px 20px 60px}
@media(max-width:900px){
  .wrap{grid-template-columns:1fr}
  .left{position:static;height:auto;order:2;border-right:0;border-top:1px solid var(--line);padding:16px 18px 30px}
  .right{order:1}
}
.show-h{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold2);font-weight:800}
.show-t{font-size:24px;font-weight:900;margin:5px 0 8px;line-height:1.2}
.show-p{font-size:14px;color:#cbb9e6;line-height:1.6}
.mock{margin:16px 0;background:var(--panel);border:1px solid #3a2a55;border-radius:14px;padding:14px}
.mock .mh{font-size:12px;color:var(--muted);margin-bottom:8px}
.auto{margin-top:14px;background:#160c28;border:1px solid var(--gold2);border-left:4px solid var(--gold);border-radius:11px;padding:12px 14px}
.auto b.hd{color:var(--gold);display:block;font-size:10.5px;letter-spacing:.09em;text-transform:uppercase;margin-bottom:5px}
.auto p{margin:0;font-size:13px;color:#e6ddf5;line-height:1.55}
.more{margin-top:14px;font-size:12px;color:var(--muted);line-height:1.6}
.more b{color:#cbb9e6}
h2{margin:0 0 4px;font-size:22px}h2:focus{outline:none}
.sub{color:var(--muted);font-size:13.5px;margin-bottom:16px}
label{display:block;font-size:12px;color:var(--muted);margin:12px 0 4px;font-weight:700}
input[type=text],input[type=email],input[type=number],input[type=url],select,textarea{width:100%;background:#120c1c;border:1px solid #43305f;border-radius:10px;color:#fff;font:15px/1.5 -apple-system,BlinkMacSystemFont,sans-serif;padding:11px 12px}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--gold2)}
.btn:focus-visible,.hit:focus-visible,.logo-drop:focus-visible,.toggle:focus-visible,.linkchip:focus-visible{outline:3px solid var(--gold);outline-offset:2px}
.hit{background:var(--panel);border:1px solid #3a2a55;border-radius:11px;padding:10px 12px;margin:7px 0;cursor:pointer;display:flex;align-items:center;gap:11px}
.hit:hover{border-color:var(--gold2)}
.hit.on{border-color:var(--gold);background:#241634}
.mono{width:40px;height:40px;border-radius:9px;background:linear-gradient(135deg,var(--purple),var(--rose));display:grid;place-items:center;font-weight:900;font-size:15px;flex:none;color:#fff}
.hit .nm{font-weight:800;font-size:14.5px}
.hit .lo{font-size:12.5px;color:#cbb9e6;font-weight:600}
.hit .ch{font-size:11.5px;color:var(--muted)}
.logo-drop{border:1px dashed #43305f;border-radius:12px;padding:18px;text-align:center;cursor:pointer;background:#160c28}
.logo-drop img{max-width:110px;max-height:110px;border-radius:10px;display:block;margin:0 auto 8px}
.consent{background:#101a12;border:1px solid #1f7a4d55;border-left:4px solid var(--green);border-radius:10px;padding:11px 13px;font-size:12.5px;color:#bfe6c9;margin-top:10px;line-height:1.55}
.skipbar{background:#160c28;border:1px solid #3a2a55;border-radius:11px;padding:11px 13px;font-size:12.5px;color:#cbb9e6;line-height:1.55;margin-bottom:14px}
.skipbar b{color:var(--gold)}
.days{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
@media(max-width:560px){.days{grid-template-columns:1fr}}
.day{display:flex;align-items:center;gap:9px;background:var(--panel);border:1px solid #3a2a55;border-radius:10px;padding:8px 11px}
.day span{width:38px;font-weight:800;font-size:13px;color:var(--gold)}
.day input{padding:8px 9px;font-size:14px}
.toggle{display:flex;align-items:center;gap:10px;background:var(--panel);border:1px solid #3a2a55;border-radius:11px;padding:11px 13px;margin:8px 0;cursor:pointer}
.toggle input{width:18px;height:18px;accent-color:var(--green);flex:none}
.toggle.off{opacity:.6}
.toggle .t{font-weight:800;font-size:14px}.toggle .d{font-size:12px;color:var(--muted)}
.linkchip{display:inline-flex;align-items:center;gap:6px;background:#241634;border:1px solid var(--gold2);color:var(--gold);border-radius:20px;padding:5px 11px;font-size:12.5px;font-weight:700;margin:3px 4px 3px 0;cursor:pointer}
.preview{background:#120c1c;border:1px solid #43305f;border-radius:11px;padding:13px;font-size:13.5px;line-height:1.6;white-space:pre-wrap;color:#e6ddf5}
.nav{display:flex;gap:9px;margin-top:22px}
.btn{flex:1;border:0;border-radius:12px;padding:13px;font-weight:900;font-size:14.5px;cursor:pointer}
.btn.go{background:var(--gold);color:#3a1d00}
.btn.back{background:#2a1c40;color:#e0cdf5;flex:0 0 92px}
.btn.ghost{background:#2a1c40;color:#cbb9e6;flex:0 0 auto;padding:10px 14px;font-size:13px}
.btn:disabled{opacity:.45;cursor:not-allowed}
.honest{margin-top:16px;font-size:11.5px;color:var(--muted);line-height:1.6}
.honest b{color:#cbb9e6}
.saved{font-size:11px;color:#7fbf95;margin-top:10px}
.done{text-align:center;padding:26px 8px}
.done .big{font-size:44px}
#toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);background:#000d;color:#fff;padding:11px 17px;border-radius:13px;font-size:13px;max-width:88%;text-align:center;opacity:0;transition:.2s;z-index:80;pointer-events:none}#toast.on{opacity:1}
</style></head>

<script>
/* ---------- DEMO/TEST band — injected ONLY when the URL has ?demo (or ?test).
   Never ships in the public 963-band directory; lets you run the whole Band Install
   onboarding end-to-end as a throwaway act. Clearly fake by name. ---------- */
(function(){ try{ var p=new URLSearchParams(location.search); if(!(p.has('demo')||p.has('test'))) return;
  var G=window.GDBandSeed; if(!G||!G.BANDS) return;
  if(G.BANDS.some(function(b){return b.id==='demo-soundcheck';})) return;
  G.BANDS.unshift({ id:'demo-soundcheck', name:'Soundcheck Sam & the Test Tones (DEMO)', city:'Anytown', state:'PA',
    chapter:'midatl', chapterName:'🌹 Mid-Atlantic', link:'https://example.com', sched:'', __demo:true });
}catch(e){} })();
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
function toast(m){var t=document.getElementById('toast');t.textContent=m;t.className='on';clearTimeout(t._h);t._h=setTimeout(function(){t.className='';},3800);}
var SEED=(window.GDBandSeed&&GDBandSeed.BANDS)||[];

/* ---------- state, with a validator (a corrupt record must never brick the wizard) ---------- */
var DEF={step:0,band:null,logo:null,logoLost:false,email:'',homepage:'',payout:'',about:'',sched:'',dates:'',store:true,tickets:true,
  price:{Mon:250,Tue:250,Wed:300,Thu:400,Fri:600,Sat:700,Sun:350},
  auto:{ads:true,setlist:true,drip:true,calendar:true,dtb:true,followup:true,hyperpost:true,invite:true,qr:true},
  lists:{email:'',fbpage:'',fbgroups:'',ig:'',x:'',web:'',otherSites:''}, listOK:false,
  chans:{fbpage:true,fbgroups:true,ig:true,x:true,email:true}, media:0, post:''};
var S=JSON.parse(JSON.stringify(DEF));
try{ var sv=JSON.parse(localStorage.getItem('dd.bandonboard')||'null');
     if(sv&&typeof sv==='object'&&!Array.isArray(sv)) S=Object.assign(S,sv); }catch(e){}
(function validate(){                        // hostile / stale / half-written state self-heals
  if(typeof S.step!=='number'||!isFinite(S.step)||S.step<0||S.step>9) S.step=0;
  if(S.band!==null&&(typeof S.band!=='object'||Array.isArray(S.band)||!S.band.name)) S.band=null;
  ['price','auto','lists','chans'].forEach(function(k){
    if(!S[k]||typeof S[k]!=='object'||Array.isArray(S[k])) S[k]=JSON.parse(JSON.stringify(DEF[k]));
    else S[k]=Object.assign(JSON.parse(JSON.stringify(DEF[k])),S[k]); });
  if(typeof S.media!=='number'||!isFinite(S.media)||S.media<0) S.media=0;
  if(S.logo) S.logo=null;                    // never restored from storage — see logoLost
  ['email','homepage','payout','about','sched','dates','post'].forEach(function(k){ if(typeof S[k]!=='string') S[k]=''; });
})();
function save(){ try{ var c=Object.assign({},S); c.logo=null; localStorage.setItem('dd.bandonboard',JSON.stringify(c)); }
  catch(e){ /* quota or private browsing — the wizard still works, it just won't resume */ } }

/* ---------- LEFT showcase ---------- */
var LEFT=[
 {h:"Step 1 · Your band, found",t:"You're already in here.",
  p:"We seeded <b>963 Dead tribute bands</b> — every one we could find, with your city and your public page. Find yourself and claim it. Nobody has to type your history from scratch.",
  mock:'<div class="mh">The directory</div><div style="font-size:13px;color:#cbb9e6">963 bands · 11 chapters · your city already listed</div>',
  auto:["We never posted your logo","We list your <b>name</b> and your <b>public page</b> — facts. <b>Your artwork is yours.</b> It appears only when you upload it, in the next step."]},

 {h:"Step 2 · Your mark",t:"Your logo. Your permission.",
  p:"Upload it and it's on your band page, your merch, your show cards, your ads. We will never take it from the internet — <b>you hand it to us, and you can pull it back any time.</b>",
  mock:'<div class="mh">Your band page</div><div style="display:flex;gap:11px;align-items:center"><div class="mono" id="mkMono">?</div><div><div style="font-weight:800" id="mkName">Your Band</div><div style="font-size:12px;color:#9a8fb0" id="mkCity">Your City</div></div></div>',
  auto:["Automation you're turning on","Your logo auto-populates <b>every show card, poster, ad, and merch mock</b> across dead.dance. Upload once."]},

 {h:"Step 3 · Your calendar",t:"Every gig, everywhere, once.",
  p:"Paste your schedule link or your dates. From then on your shows appear on the <b>map</b>, the <b>chapter calendar</b> (a chapter is your region — yours is below), the <b>Near You</b> feed, and every fan who tuned in to you.",
  mock:'<div class="mh">Shows on the map</div><div style="font-size:13px;color:#cbb9e6">🗺️ your dates, plotted · 🔔 fans notified · 📅 one calendar</div>',
  auto:["Automation you're turning on","<b>Post once, appear everywhere.</b> Add a date and it lands on the map, the chapter calendar, and the feeds of everyone tuned in to your band."],
  cta:{hd:"Tease your setlist",p:"For your next show, drop your songs and how long each runs — we <b>reveal them to your fans one at a time</b> and count them down to showtime. It's the reason bands hand us their fan list.",btn:"🎵 Tease your set to your fans →"}},

 {h:"Step 4 · Your store",t:"A merch store that runs itself.",
  p:"Shirts, stickers, posters, and — when you're ready — <b>Print-the-Vinyl</b>: a fan orders your own live show pressed to a real record, one at a time, and it ships to them. No inventory, no boxes in the van.",
  mock:'<div class="mh">Your store</div><div style="font-size:13px;color:#cbb9e6">👕 Tour tees · 🎵 Print-the-Vinyl on demand · 🎟️ ticket bundles</div>',
  auto:["Automation you're turning on","Every show you add spins up a <b>show-specific merch card</b> — the shirt, the poster, the date. It closes when the night ends."]},

 {h:"Step 5 · Your price",t:"Monday isn't Friday.",
  p:"Set what you charge to play, <b>per day of the week</b>. Venues and wedding planners search dead.dance for a Dead band on a Thursday — and you show up with a real number.",
  mock:'<div class="mh">Booking search</div><div style="font-size:13px;color:#cbb9e6">“Who plays around here?” → <b>your band, your night, your price</b></div>',
  auto:["Nothing here is a commitment","These are <b>starting points, not offers.</b> A number only shows when a host searches your region for that night, and you can change it any time."]},

 {h:"Step 6 · Getting paid",t:"Your money, straight to you.",
  p:"Tickets, merch, bookings — paid to you. <b>We never take a cut of your door.</b> Any platform fee sits with the ticket buyer, never with the band. That's a house rule, not a promo.",
  mock:'<div class="mh">The house rule</div><div style="font-size:13.5px;color:#e6ddf5">🔒 <b>We do not charge the band. Ever.</b></div>',
  auto:["Our promise","<b>Nothing bills today.</b> Payouts arm when payments are connected <b>and you've signed a short agreement</b> — you'll read it first, and nothing is owed either way."]},

 {h:"Step 7 · The automations",t:"We write your ad. Every show.",
  p:"This is the part nobody else does. Add a show, and dead.dance <b>curates the ad for that show</b> — your copy, your art, your ticket link — and serves it to Deadheads near that venue, on the right dates.",
  mock:'<div class="mh">Auto-curated show ad</div><div style="border:1px solid #3a2a55;border-radius:9px;padding:9px;font-size:12.5px;color:#cbb9e6"><b id="adBand" style="color:#ffd76a">Your Band</b><br><span id="adLine">Friday · The Venue · doors 7, show 8</span><br><span style="color:#9a8fb0">shown to Deadheads within 50 miles</span></div>',
  auto:["It costs you nothing","<b>You never buy an ad here.</b> You register the show; we write it and show it near the venue, by date. There's <b>no auction and nobody can outbid you</b> — your own show is always the ad in your own town. A human always clicks send."]},

 {h:"Step 8 · Your people",t:"Bring your list — or don't.",
  p:"Your email list, your Facebook page, your groups. <b>Every bit of this step is optional</b>, and everything else works without it. If you do import: <b>we never sell, rent, or share your list, and we never mail it without you.</b>",
  mock:'<div class="mh">Your channels</div><div style="font-size:13px;color:#cbb9e6" id="mkChans">📘 Page · 👥 Groups · 📷 IG · ✖ X · ✉️ Email</div>',
  auto:["What a HyperPost is","<b>One post, sent to every place your fans already follow you.</b> We call that a HyperPost. We write a version for each channel — the long one for email, the right one for each feed — and <b>you click send on every single one.</b>"]},

 {h:"Step 9 · Your first HyperPost",t:"We wrote it. You send it.",
  p:"Your calendar, your store, your Friday night — one post, out to everybody you already have. This is your <b>first</b> HyperPost. There will be one for every show.",
  mock:'<div class="mh">One image per channel</div><div style="font-size:13px;color:#cbb9e6" id="mkSpread">— channels checked</div>',
  auto:["Art is optional","<b>Words are enough.</b> If you do have show art, one image per channel makes each post its own — that's <b id='mkAsk'>5</b> right now. <b>Don't have them? Send it anyway.</b> Add more later and I already know where they go."]},

 {h:"Step 10 · Done",t:"You're all set.",
  p:"Your page is live, your logo is yours, your calendar syncs, your store is open, and your ads write themselves. Welcome to the family.",
  mock:'<div class="mh">What just turned on</div><div style="font-size:13px;color:#cbb9e6">🎸 Band page · 🗺️ Map · 📅 Calendar · 🛍️ Store · 📡 Ads · 🔊 HyperPost · 🎟️ QR</div>',
  auto:["Our promise","Nothing bills. Nothing mails without you. <b>You can remove your logo, your list, your dates, or your whole band page at any time.</b>"],
  cta:{hd:"One more thing your fans will love",p:"Before your next show, tease your setlist. Reveal a song a day, count them down, and blast the sneak peek to your own list. Your fans show up already buzzing.",btn:"🎵 Tease your setlist →"}}
];

function setlistHref(){ var b=S.band, name=(b&&b.name)||S.newName||''; var show=String(S.dates||S.sched||'').split(/\n/)[0]||''; return 'stagefill_setlist.html?band='+encodeURIComponent(name)+'&show='+encodeURIComponent(show); }
function renderLeft(){
  var L=LEFT[S.step];
  document.getElementById('left').innerHTML=
    '<div class="show-h">'+L.h+'</div><div class="show-t">'+L.t+'</div><div class="show-p">'+L.p+'</div>'+
    '<div class="mock">'+L.mock+'</div>'+
    '<div class="auto"><b class="hd">'+L.auto[0]+'</b><p>'+L.auto[1]+'</p></div>'+
    '<div class="more"><b>And this is more than a tribute-band listing:</b> the live Grateful Dead archive that plays, DeadDance Karaoke, the games, a group for every region, real-time setlist broadcast, and a marketplace — <b>your fans are already in here.</b></div>'+
    (L.cta ? '<div class="auto" style="border-color:#f0c96b66;background:#2a2011"><b class="hd" style="color:#ffd76a">🎵 '+L.cta.hd+'</b><p>'+L.cta.p+'</p><a href="'+setlistHref()+'" target="_blank" rel="noopener" style="display:inline-block;margin-top:9px;background:#f0a500;color:#3a1d00;font-weight:800;border-radius:11px;padding:11px 16px;text-decoration:none;font-size:13.5px">'+L.cta.btn+'</a></div>' : '');
  var b=S.band;
  if(b){ var mn=document.getElementById('mkMono'), nm=document.getElementById('mkName'), ct=document.getElementById('mkCity');
    if(mn){ if(S.logo){mn.outerHTML='<img src="'+esc(S.logo)+'" alt="" style="width:40px;height:40px;border-radius:9px;object-fit:cover">';} else mn.textContent=b.mono; }
    if(nm)nm.textContent=b.name; if(ct)ct.textContent=[b.city,b.state].filter(Boolean).join(', ');
    var ab=document.getElementById('adBand'); if(ab)ab.textContent=b.name;
  }
  var mc=document.getElementById('mkChans'), cn=hpSpread();
  if(mc)mc.innerHTML=cn?('<b style="color:#ffd76a">'+cn+'</b> channel'+(cn===1?'':'s')+' · '+listCount()+' contacts<br>'+
      CHANS.filter(function(c){return S.chans[c[0]];}).map(function(c){return esc(c[1]);}).join(' · ')):'<span style="color:#b8002e">no channels checked</span>';
  var ms=document.getElementById('mkSpread'), mk=document.getElementById('mkAsk');
  if(ms)ms.innerHTML='<b style="color:#ffd76a">'+cn+'</b> channel'+(cn===1?'':'s')+' · <b style="color:#ffd76a">'+cn+'</b> post'+(cn===1?'':'s')+' · '+listCount()+' contacts';
  if(mk)mk.textContent=cn;
  document.getElementById('bar').style.width=((S.step+1)/LEFT.length*100)+'%';
  document.getElementById('barwrap').setAttribute('aria-valuenow',S.step+1);
  document.getElementById('stepn').textContent=(S.step+1)+' / '+LEFT.length;
}

/* ---------- Step 1 · find ---------- */
function search(q){ q=(q||'').trim().toLowerCase(); if(q.length<2) return [];
  return SEED.filter(function(b){return b.name.toLowerCase().indexOf(q)>=0;}).slice(0,8); }
function stepFind(){
  var b=S.band;
  return '<h2 tabindex="-1">Find your band</h2><div class="sub">We seeded '+SEED.length+' Dead tribute bands. Start typing — you\'re probably already here.</div>'+
    (b?'<div class="consent" style="margin-bottom:12px">🌹 <b>'+esc(b.name)+'</b> — '+esc([b.city,b.state].filter(Boolean).join(', ')||'location not listed')+
        '<br><span style="color:#9fd6b3">Wrong one? Search again below and pick a different city.</span></div>':'')+
    '<label for="q">Band name</label><input type="text" id="q" placeholder="Start typing your band…" autocomplete="off" oninput="doSearch()">'+
    '<div id="hits"></div>'+
    '<div id="newband"></div>'+
    '<div class="honest">Not listed? <button class="btn ghost" onclick="addNew()">Add your band</button><br><br><b>We list names and public pages only.</b> No logos, no contact details, until you give them.</div>';

window.doSearch=function(){

    '<div class="honest" style="margin-top:6px">The <span class="linkchip">🔗 like this</span> chips become your real links when you send — nothing to fill in. '+
      '<button class="btn ghost" onclick="hpShowRaw()">Edit the words</button></div>'+
    '<div id="rawpost" style="display:none">'+
      '<label for="pt">The post — goes to '+need+' channel'+(need===1?'':'s')+' and '+listCount()+' contacts</label>'+
      '<textarea id="pt" rows="12" oninput="S.post=this.value;save()">'+esc(post)+'</textarea>'+
      '<div class="honest">Leave the %WORDS% in — they turn into your links. Delete one and that link is simply left out.</div></div>'+
    (listCount()?'<div class="consent" style="margin-top:14px">✉️ <b>The email version</b> automatically carries your band\'s mailing address and a one-click <b>unsubscribe</b>. That\'s federal law (CAN-SPAM), and we won\'t send one without it. Anyone who unsubscribes is never mailed again.</div>':'')+
    '<label style="margin-top:14px">💬 The short version, for feeds</label>'+
    '<div class="mock" style="margin:0"><div style="font-size:13px;color:#cbb9e6">'+esc(short)+'</div></div>'+
    '<label style="margin-top:14px">📸 Show art <span style="font-weight:400">(optional)</span></label>'+
    '<div class="logo-drop" tabindex="0" role="button" aria-label="Add show art" onclick="document.getElementById(\'mf\').click()" onkeydown="if(event.key===\'Enter\'||event.key===\' \'){event.preventDefault();document.getElementById(\'mf\').click();}">'+
      '<div style="font-size:30px">'+(have?'📸':'🖼️')+'</div>'+
      '<div style="font-weight:800;font-size:14px;margin-top:4px">'+(have?have+' image'+(have===1?'':'s')+' added — tap to change':'Tap to add show art, or skip it')+'</div>'+
      '<div style="font-size:12px;color:var(--muted);margin-top:3px">One per channel means each post gets its own image.</div>'+
    '</div><input type="file" id="mf" accept="image/*" multiple style="display:none" onchange="hpMedia(this.files)">'+
    '<div class="auto" style="margin-top:12px"><b class="hd">Art is optional</b><p>'+ask+'</p></div>'+
    '<div class="honest"><b>Nothing sends from this screen.</b> Your post is saved as a draft. You — or your Ambassador — open it, look at it, and click send. '+
      (listCount()&&!S.listOK?'<br><b style="color:var(--gold)">⚠️ Confirm permission for your email list on the previous step before anything can go out.</b>':'')+'</div>';
}

/* ---------- Step 10 ---------- */
function stepDone(){
  var b=S.band||{name:'Your band'};
  return '<div class="done"><div class="big">🌹</div><h2 tabindex="-1">'+esc(b.name)+' is all set.</h2>'+
    '<div class="sub">Your page is live, your logo is yours, and your ads write themselves.</div>'+
    '<div class="consent" style="text-align:left">✅ Band page · ✅ Calendar &amp; map · ✅ Store'+(S.store?'':' (off)')+' · ✅ Booking price by night · ✅ '+
      Object.keys(S.auto).filter(function(k){return S.auto[k];}).length+' automations · ✅ '+hpSpread()+' channels · ✅ first HyperPost drafted</div>'+
    '<div class="honest" style="text-align:left"><b>Our promise:</b> nothing bills, nothing sends without a human, your list is never sold or shared, and we never take a cut of your door. Remove anything, any time.<br><br>'+
      '<b>Next:</b> Michael or your regional Ambassador reviews your page and brings you that short agreement. <b>Nothing is owed, and nothing sends, until you say so.</b></div>'+
    crossLinkBlock(b)+
    (window.DDRefer?DDRefer.card(b.name,(b.id||'')):'')+
    '<button class="btn go" style="margin-top:16px" onclick="finish()">Finish install</button></div>';
}
/* ---------- Cross-link: put deaddance.app/<band> on the band's OWN Facebook ----------
   Legal + within Facebook's Terms: the band adds their own link to their own Page — no API,
   no automation, admin's own hands. We just make it one tap, and only WITH their confirmation.
   (A deeper auto-add via the Pages API is possible but needs the band's Facebook OAuth grant
   + Meta App Review — see DESIGN_fb_crosslink.md. This is the immediately-legal Tier 1.) */
/* short, clean handle: cut the name at the first descriptor separator, then slugify.
   "Deal - Celebrating the Music of the Grateful Dead" → "deal" */
function shortHandle(name){
  var n=String(name||'');
  n=n.split(/\s+[-–—:]\s+|\s*\(|\s+(?:feat\.?|featuring|celebrating|tribute|presents)\b/i)[0]||n;
  var s=n.toLowerCase().trim().replace(/&/g,'and').replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'');
  return s||'band';
}
function fbxUrl(){ var el=document.getElementById('fbxHandle'); var h=el?el.value:(S&&S.fbHandle); h=(h||shortHandle(S.band&&S.band.name)).toLowerCase().replace(/[^a-z0-9-]/g,''); return 'https://deaddance.app/'+h; }
window.fbxHandleChange=function(){ var el=document.getElementById('fbxHandle'); if(el){ el.value=el.value.toLowerCase().replace(/[^a-z0-9-]/g,''); try{S.fbHandle=el.value;save();}catch(e){} } var u=document.getElementById('fbxFull'); if(u)u.textContent=fbxUrl(); fbxQRrender(); };
function fbxQRrender(){ try{ if(window.DDQR&&document.getElementById('fbxQR')) DDQR.into('fbxQR', fbxUrl(), {mark:'dd', size:220, css:110}); }catch(e){} }
window.fbxQRsave=function(){ try{ var h=(document.getElementById('fbxHandle')||{}).value||'deaddance'; DDQR.save(fbxUrl(), {mark:'dd'}, h+'-deaddance-QR.png'); }catch(e){} };
function crossLinkBlock(b){
  var handle=(S&&S.fbHandle)||shortHandle(b&&b.name), full='https://deaddance.app/'+handle;
  var blurb='We’re on DeadDance 🌹 — our shows, songbook, store & fan group all in one place: '+full;
  return '<div class="fbx" style="text-align:left;border:1px solid #ece7f2;border-radius:14px;padding:15px;margin-top:16px;background:#fff">'+
    '<div style="font-weight:900;font-size:15px;margin-bottom:3px">Put your DeadDance link on Facebook 🔗</div>'+
    '<div class="honest" style="margin:0 0 10px">Add your DeadDance link to your own Page so every visitor reaches your calendar, store, and group. <b>You add it on your own Page</b> — 100% within Facebook’s Terms; we just make it one tap. Pick your handle:</div>'+
    '<div style="display:flex;align-items:center;gap:2px;background:#faf7ff;border:1px solid #efe9f6;border-radius:11px;padding:9px 11px;font-weight:800;font-size:14px;flex-wrap:wrap">'+
      '<span style="color:#7a7285">deaddance.app/</span>'+
      '<input id="fbxHandle" value="'+esc(handle)+'" oninput="fbxHandleChange()" spellcheck="false" style="border:0;border-bottom:2px solid #b8002e;background:none;font:inherit;font-weight:800;color:#b8002e;width:auto;min-width:90px;flex:1;padding:2px 0">'+
    '</div>'+
    /* QR shown BY DEFAULT — right there, light background, ready to send */
    '<div style="display:flex;gap:13px;align-items:center;margin-top:12px;background:#fff;border:1px solid #efe9f6;border-radius:12px;padding:13px">'+
      '<div id="fbxQR" style="width:120px;height:120px;flex:0 0 120px;background:#fff;border-radius:10px"></div>'+
      '<div style="font-size:12.5px;color:#4a4356;line-height:1.45"><b>Your QR — ready to send 🌹</b><br>Every scan opens your DeadDance page. Text it, print it, put it on the case.'+
        '<div style="display:flex;gap:6px;margin-top:8px"><button class="btn ghost" style="padding:8px 12px;font-size:12px" onclick="fbxCopy()">📋 Copy link</button><button class="btn ghost" style="padding:8px 12px;font-size:12px" onclick="fbxQRsave()">⬇︎ Save QR</button></div></div>'+
    '</div>'+
    '<label style="display:flex;gap:9px;align-items:flex-start;cursor:pointer;font-size:13.5px;font-weight:700;margin-top:13px">'+
      '<input type="checkbox" id="fbxOk" onchange="fbxConfirm(this.checked)" style="width:18px;height:18px;margin-top:1px;accent-color:#b8002e">'+
      '<span>Also add DeadDance to <b>'+esc(b.name||'our')+'</b>’s Facebook Page? This is our page and our choice.</span></label>'+
    '<div id="fbxActions" style="display:none;margin-top:11px">'+
      '<button class="btn" style="width:100%;background:#1877f2;color:#fff;border-color:#1877f2" onclick="fbxShare()">↗ Share to Facebook</button>'+
      '<div style="margin-top:10px;font-size:12.5px;color:#4a4356;line-height:1.55">'+
        '<b>Add it to your Page in 20 seconds:</b><br>'+
        '1. Open your Facebook Page → <b>Edit</b> (or Page settings → About).<br>'+
        '2. Under <b>Contact &amp; basic info → Website</b>, paste: <span id="fbxFull" style="font-weight:800">'+esc(full)+'</span><br>'+
        '3. Prefer a button? <b>Add a Button → Learn More / Sign Up</b> → same link. Or pin a post with it.</div>'+
        '<div class="honest" style="margin-top:9px">We’ll also hand your Ambassador a ready-to-paste blurb: <i>“'+esc(blurb)+'”</i></div>'+
    '</div></div>';
}
window.fbxConfirm=function(on){ try{ S.fbCrossLink=!!on; save(); }catch(e){} var a=document.getElementById('fbxActions'); if(a)a.style.display=on?'block':'none';
  if(on){ fbxQRrender(); if(typeof toast==='function') toast('🔗 Nice — share it, paste it, or print your QR any time.'); } };
window.fbxShare=function(){ window.open('https://www.facebook.com/sharer/sharer.php?u='+encodeURIComponent(fbxUrl()),'_blank','noopener'); };
window.fbxCopy=function(){ var full=fbxUrl();
  try{ navigator.clipboard.writeText(full); if(typeof toast==='function') toast('📋 Copied '+full+' — paste it on your Page.'); }
  catch(e){ if(typeof toast==='function') toast(full); } };
/* ---------- Step 0.5 · "Is this your band / your logo?" — the claim opener ---------- */
function claimHost(){ try{ var u=(S.band&&S.band.link)||S.homepage||''; if(!u)return''; if(u.indexOf('http')!==0)u='http://'+u; return new URL(u).hostname.replace(/^www\./,''); }catch(e){ return ''; } }
/* the band's own Facebook page slug → their profile picture IS their logo (the seal).
   "When they sign up, use THAT logo." Works for every FB-page band, not just one. */
function claimFbSlug(){
  try{ var u=String((S.band&&(S.band.link||S.band.events))||S.homepage||'');
    var pm=u.match(/facebook\.com\/profile\.php\?id=(\d+)/i); if(pm) return pm[1];          // profile.php?id=NNN
    var pg=u.match(/facebook\.com\/pages\/[^\/]+\/(\d+)/i);   if(pg) return pg[1];          // /pages/Name/NNN
    var m=u.match(/facebook\.com\/([^\/?#]+)/i);                                            // /slug
    if(m){ var s=m[1]; if(['pages','profile.php','people','groups','p','sharer','events'].indexOf(s.toLowerCase())<0) return s; }
  }catch(e){}
  return '';
}
function claimGuessUrl(){
  try{ if(window.DDLogoGuess && S.band && DDLogoGuess[S.band.id]) return DDLogoGuess[S.band.id]; }catch(e){}   // curated override wins
  var fb=claimFbSlug(); if(fb) return 'https://graph.facebook.com/'+encodeURIComponent(fb)+'/picture?type=large&width=240';   // their FB profile pic = their logo
  var h=claimHost(); if(h && h.indexOf('facebook.')<0 && h.indexOf('.')>0) return 'https://www.google.com/s2/favicons?domain='+encodeURIComponent(h)+'&sz=128';
  return '';
}
function renderClaimConfirm(){
  var b=S.band||{}, g=claimGuessUrl(), loc=[b.city,b.state].filter(Boolean).join(', ');
  var pic = g ? '<img src="'+esc(g)+'" alt="logo" style="width:104px;height:104px;object-fit:contain;border-radius:20px;background:#fff;border:1px solid #ece7f2" onerror="this.style.display=\'none\';var m=document.getElementById(\'ccMono\');if(m)m.style.display=\'flex\'">' : '';
  var html='<div style="text-align:center;padding:4px 0">'+
    '<div style="color:#b8002e;font-weight:800;letter-spacing:.06em;text-transform:uppercase;font-size:12px">DeadDance · your band’s home</div>'+
    '<h2 tabindex="-1" style="font-size:27px;margin:12px 0 4px">Is this your band?</h2>'+
    '<div style="display:flex;flex-direction:column;align-items:center;gap:12px;margin:16px 0">'+
      pic+
      '<div id="ccMono" class="mono" style="width:104px;height:104px;'+(g?'display:none;':'display:flex;')+'align-items:center;justify-content:center;font-size:36px">'+esc(b.mono||'🌹')+'</div>'+
      '<div><div style="font-weight:900;font-size:22px">'+esc(b.name||'Your band')+'</div>'+(loc?'<div class="sub" style="margin-top:2px">'+esc(loc)+'</div>':'')+'</div>'+
    '</div>'+
    (g?'<div class="honest" style="text-align:left">We found this on your public page. <b>Is this your logo?</b> Say yes and upload it in one tap to make it officially yours — <b>we never take artwork from the internet.</b></div>'
      :'<div class="honest" style="text-align:left">We drafted a home for <b>'+esc(b.name||'your band')+'</b> — your calendar, a store, and a group your fans can join. Claim it and add your logo in one tap.</div>')+
    '<button class="btn go" style="width:100%;margin-top:16px" onclick="claimYes()">🌹 Yes — that’s our band</button>'+
    '<button class="btn ghost" style="width:100%;margin-top:8px" onclick="claimNo()">Not our band →</button>'+
  '</div>';
  document.getElementById('right').innerHTML=html;
  try{ var h=document.querySelector('#right h2'); if(h&&h.focus)h.focus(); }catch(e){}
  window.scrollTo(0,0);
}
window.claimYes=function(){ S.claimSeen=true; var g=claimGuessUrl(); if(g)S.logoGuess=g; S.step=1; save(); render(); toast('🌹 Welcome, '+((S.band&&S.band.name)||'')+' — let’s make it yours.'); };
window.claimNo=function(){ S.claimSeen=true; S.fromClaim=false; S.band=null; S.step=0; save(); render(); };

var STEPS=[stepFind,stepLogo,stepCal,stepStore,stepPrice,stepPay,stepAuto,stepLists,stepHyper,stepDone];

function canNext(){
  if(S.step===0) return !!S.band;
  if(S.step===7) return !listCount()||S.listOK;   // never move a real list without permission
  return true;
}
function render(){
  if(S.fromClaim && !S.claimSeen && S.band){ renderClaimConfirm(); return; }
  document.getElementById('right').innerHTML=STEPS[S.step]()+
    (S.step<STEPS.length-1?'<div class="nav">'+(S.step>0?'<button class="btn back" onclick="go(-1)">← Back</button>':'')+
      '<button class="btn go" id="nx" onclick="go(1)" '+(canNext()?'':'disabled')+'>'+(S.step===0?'That\'s my band →':'Continue →')+'</button></div>':'');
  renderLeft();
  if(S.step===0){var q=document.getElementById('q'); if(q&&S.band){q.value=S.band.name; doSearch();}}
  var h=document.querySelector('#right h2'); if(h&&h.focus)h.focus();
  if(document.getElementById('fbxQR')) fbxQRrender();   /* QR visible by default on the cross-link step */
  var r=document.getElementById('right');
  if(window.innerWidth<=900&&r&&r.scrollIntoView) r.scrollIntoView({block:'start'});
  else window.scrollTo(0,0);
}
window.go=function(d){ if(d>0&&!canNext())return; S.step=Math.max(0,Math.min(STEPS.length-1,S.step+d)); save(); render(); };
window.finish=function(){
  /* PERSIST THE CLAIM FIRST — a real row Michael/the Ambassador can see (was: saved to nothing). */
  try{
    var b=S.band||{}, at=S.attrib||{};
    var note=[[b.city,b.state].filter(Boolean).join(', '), (S.homepage?('site: '+S.homepage):''), (S.payout?('payout: '+S.payout):''), (S.about?('about: '+S.about):'')].filter(Boolean).join(' · ');
    if(window.DDJoin && DDJoin.claimBand){
      DDJoin.claimBand({ band:b.name||'(unnamed band)', ref:at.ref_band||at.claim_band||null,
        src:at.src||'claim', region:b.chapterName||b.chapter||null,
        contactName:b.name||null, contactEmail:(S.email||null), note:note||null })
        .then(function(id){ try{ localStorage.setItem('dd.claim.id', id||''); }catch(e){} })
        .catch(function(){});
    }
    /* PERSIST THE BAND + LOGO to the real directory, so it shows in the Bands tab for everyone (dd_bands). */
    try{ if(window.DDBands){ DDBands.upsert({ name:b.name, city:b.city, state:b.state,
        region:b.chapterName||b.chapter||null, about:S.about||null, links:S.homepage||null, logo:S.logo||null }); } }catch(e){}
  }catch(e){}
  S.lists={email:'',fbpage:'',fbgroups:''}; S.listOK=false; S.logo=null; save();   // don't leave PII sitting on the device
  toast('🌹 Installed — your claim is in. Michael or your Ambassador will reach out with the short agreement — nothing is owed until you sign, and nothing sends until you click.'); };

/* ---------- region: stamp the origination chapter so support/referrals route to the right Ambassador ---------- */
function persistRegion(b){ try{ if(b&&b.chapter){ localStorage.setItem('dd.chapter',b.chapter); if(b.chapterName)localStorage.setItem('dd.chapterName',b.chapterName); } }catch(e){} }

/* ---------- attribution: land an invited band on THEIR page, and remember where the claim came from ---------- */
(function(){ try{
  var cid=new URLSearchParams(location.search).get('claim');            // HOP 1: our email → this band
  if(cid){ var f=SEED.filter(function(b){return b.id===cid;})[0]; if(f){ S.fromClaim=true; if(!S.band || S.band.id!==f.id){ S.band=f; S.claimSeen=false; if(S.step<1)S.step=0; } } }
  if(S.band) persistRegion(S.band);
  if(window.DDAttrib){ S.attrib=window.DDAttrib.stamp(); }              // stamp src/wave/batch (rides to server when claims record)
  save();
}catch(e){} })();

/* boot — a bad saved state must never white-screen a band */
if(!SEED.length){ document.getElementById('right').innerHTML='<h2>Band directory didn\'t load</h2><div class="sub">Reload the page.</div>'; }
else { try{ if(S.step>1&&!S.logo) S.logoLost=true; render(); }
  catch(e){ try{localStorage.removeItem('dd.bandonboard');}catch(x){}
    document.getElementById('right').innerHTML='<h2>Let\'s start fresh</h2><div class="sub">Something in your saved progress was unreadable, so we cleared it. <button class="btn ghost" onclick="location.reload()">Start over</button></div>'; } }
</script>
<script src="dd_back.js"></script>
</body></html>
