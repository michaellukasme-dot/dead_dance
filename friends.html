<!doctype html><html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Friends · DeadDance</title>
<meta name="theme-color" content="#2a1b3d">
<style>
  :root{--rose:#b8002e;--purple:#5a2e86;--accent:#7a3cc0;--gold:#c79a3a;--ink:#23202a;--muted:#7a7686;--line:#e7ddf5;--bg:#f2ecfb;--card:#fff;--ok:#2a6b46}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;-webkit-font-smoothing:antialiased}
  a{color:inherit;text-decoration:none}
  .shell{display:flex;min-height:100vh;max-width:1180px;margin:0 auto}
  /* sidebar */
  .side{width:290px;flex:none;background:var(--card);border-right:1px solid var(--line);padding:14px 10px 30px}
  .side .head{display:flex;align-items:center;justify-content:space-between;padding:6px 8px 12px}
  .side .head h1{font-size:23px;font-weight:900;margin:0}
  .gear{width:34px;height:34px;border-radius:50%;border:0;background:#eee7f4;color:var(--purple);font-size:16px;cursor:pointer;position:relative}
  .nav a{display:flex;align-items:center;gap:12px;padding:9px 10px;border-radius:11px;font-weight:700;font-size:15px;cursor:pointer}
  .nav a .i{width:36px;height:36px;border-radius:50%;background:#ece7f2;display:flex;align-items:center;justify-content:center;font-size:17px;flex:none}
  .nav a.on{background:#efe9f8}.nav a.on .i{background:var(--purple);color:#fff}
  .nav a:hover{background:#f6f2fb}
  .nav a .chev{margin-left:auto;color:var(--muted)}
  /* main */
  .main{flex:1;min-width:0;padding:18px 20px 60px}
  .main h2{font-size:20px;font-weight:900;margin:0 0 3px}
  .sechead{display:flex;align-items:center;justify-content:space-between;margin:0 0 14px}
  .seeall{color:var(--accent);font-weight:800;font-size:13.5px;cursor:pointer}
  .sub{color:var(--muted);font-size:13px;font-weight:700;margin:0 0 12px}
  /* request/pymk cards grid */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(168px,1fr));gap:14px}
  .fcard{background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden}
  .fcard .ph{height:168px;display:flex;align-items:center;justify-content:center;font-size:46px;font-weight:900;color:#fff}
  .fcard .bd{padding:10px 11px 12px}
  .fcard .nm{font-weight:800;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .fcard .mu{color:var(--muted);font-size:12px;margin:3px 0 10px;display:flex;align-items:center;gap:5px;min-height:16px}
  .fcard .mu .dots{display:inline-flex}.fcard .mu .dots span{width:15px;height:15px;border-radius:50%;border:1.5px solid #fff;margin-left:-5px;display:inline-block}
  .btn{width:100%;border:0;border-radius:9px;padding:9px;font-weight:800;font-size:13.5px;cursor:pointer;margin-top:7px}
  .btn.primary{background:var(--accent);color:#fff}.btn.primary:hover{background:#6a2fb0}
  .btn.sub{background:#e9e5ef;color:#333}.btn.sub:hover{background:#ded8e8}
  .btn.done{background:#e7f2ec;color:var(--ok)}
  .divider{height:1px;background:var(--line);margin:26px 0}
  /* list rows (all friends / suggestions / birthdays) */
  .row{display:flex;align-items:center;gap:13px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:10px 13px;margin-bottom:10px}
  .av{width:56px;height:56px;border-radius:50%;flex:none;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:900;font-size:20px}
  .av.sm{width:44px;height:44px;font-size:16px}
  .row .info{flex:1;min-width:0}
  .row .info b{font-size:15.5px;display:block}
  .row .info span{color:var(--muted);font-size:12.5px}
  .row .acts{display:flex;gap:8px;flex:none}
  .rbtn{border:0;border-radius:9px;padding:8px 14px;font-weight:800;font-size:13px;cursor:pointer;background:var(--accent);color:#fff}
  .rbtn.g{background:#e9e5ef;color:#333}
  .kebab{border:0;background:#efeaf4;width:34px;height:34px;border-radius:8px;font-size:16px;cursor:pointer;color:#555}
  .empty{text-align:center;color:var(--muted);padding:70px 20px}
  .empty .big{font-size:44px}
  /* settings popover */
  .pop{position:absolute;top:42px;right:0;width:280px;background:#fff;border:1px solid var(--line);border-radius:14px;box-shadow:0 18px 50px #2a1b3d33;padding:14px;z-index:20;display:none;text-align:left}
  .pop.on{display:block}
  .pop h4{margin:0 0 3px;font-size:15px}.pop p{margin:0 0 12px;color:var(--muted);font-size:12.5px;line-height:1.4}
  .tog{display:flex;align-items:center;justify-content:space-between;font-weight:700;font-size:14px}
  .sw{width:46px;height:26px;border-radius:20px;background:#ccc4d6;position:relative;cursor:pointer;transition:.2s;flex:none}
  .sw.on{background:var(--accent)}.sw i{position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:.2s}
  .sw.on i{left:23px}
  .rose{color:var(--rose)}
  .invitepill{display:flex;align-items:center;gap:12px;width:100%;margin-top:14px;border:0;border-radius:12px;padding:11px 12px;cursor:pointer;font-weight:800;font-size:15px;color:#fff;background:linear-gradient(135deg,#e0577a,#b8002e);box-shadow:0 8px 20px #b8002e33}
  .invitepill .i{width:34px;height:34px;border-radius:50%;background:#ffffff2e;display:flex;align-items:center;justify-content:center;font-size:17px;flex:none}
  .invitebanner{display:flex;align-items:center;gap:14px;background:linear-gradient(135deg,#efe7fb,#e0d3f5);border:1px solid var(--line);border-radius:16px;padding:16px 18px;margin-bottom:20px}
  .invitebanner .txt{flex:1;min-width:0}.invitebanner .txt b{font-size:16px;display:block;color:var(--purple)}.invitebanner .txt span{font-size:12.5px;color:#6a5a86}
  .invitebanner button{border:0;border-radius:11px;padding:11px 16px;font-weight:900;font-size:14px;cursor:pointer;background:linear-gradient(135deg,#7a3cc0,#5a2e86);color:#fff;white-space:nowrap}
  @media(max-width:720px){.invitepill b{display:none}.invitepill{justify-content:center;padding:10px 0}.invitebanner{flex-direction:column;text-align:center}}
  @media(max-width:720px){
    .side{width:74px;padding:12px 6px}.side .head h1,.nav a b,.nav a .chev,.side .head .lbl{display:none}
    .nav a{justify-content:center;padding:8px 0}.gear{margin:0 auto}
    .side .head{justify-content:center}
    .grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr))}
  }
</style></head>
<body>
<div class="shell">
  <!-- SIDEBAR -->
  <aside class="side">
    <div class="head">
      <h1><span class="rose">🌹</span> Friends</h1>
      <button class="gear" onclick="togPop(event)" title="Notification settings">⚙️
        <div class="pop" id="pop" onclick="event.stopPropagation()">
          <h4>Notification settings</h4>
          <p>Manage how you're notified about Friends updates.</p>
          <div class="tog"><span>Show notification dots</span><div class="sw on" id="dotSw" onclick="togDots()"><i></i></div></div>
        </div>
      </button>
    </div>
    <nav class="nav" id="nav">
      <a data-s="home" class="on" onclick="go('home')"><span class="i">🏠</span><b>Home</b></a>
      <a data-s="requests" onclick="go('requests')"><span class="i">🧑‍🤝‍🧑</span><b>Friend requests</b><span class="chev">›</span></a>
      <a data-s="suggestions" onclick="go('suggestions')"><span class="i">✨</span><b>Suggestions</b><span class="chev">›</span></a>
      <a data-s="all" onclick="go('all')"><span class="i">👥</span><b>All friends</b><span class="chev">›</span></a>
      <a data-s="birthdays" onclick="go('birthdays')"><span class="i">🎂</span><b>Birthdays</b></a>
      <a data-s="lists" onclick="go('lists')"><span class="i">🗂️</span><b>Custom lists</b><span class="chev">›</span></a>
    </nav>
    <button class="invitepill" onclick="inviteFriends()"><span class="i">🌹</span><b>Invite friends</b></button>
  </aside>

  <!-- MAIN -->
  <main class="main" id="main"></main>
</div>

<script>
/* ---------- illustrative Deadhead data (falls back to app data via DDFriends/DDPymk when present) ---------- */
var G=['linear-gradient(150deg,#e0577a,#b8002e)','linear-gradient(150deg,#3a2456,#5a2e86)','linear-gradient(150deg,#1f9e6b,#123b28)','linear-gradient(150deg,#d19a2a,#8a5a12)','linear-gradient(150deg,#7a3cc0,#3a1f57)','linear-gradient(150deg,#2f7bf6,#12305e)'];
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
function mono(n){return String(n||'').replace(/[^A-Za-z ]/g,'').split(/\s+/).filter(Boolean).slice(0,2).map(function(w){return w[0].toUpperCase();}).join('')||'🌹';}
function grad(i){return G[i%G.length];}
function heads(n){var h='<span class="dots">';for(var k=0;k<Math.min(2,n);k++)h+='<span style="background:'+grad(k+3)+'"></span>';return h+'</span>';}

var REQS=[
  {name:'Donald McKinnon', mutual:31, when:'16w'},
  {name:'Monica Kerchner', mutual:3,  when:'1y'},
  {name:'Joelle Lynn',     mutual:21, when:'2w'},
  {name:'Berr Raph',       mutual:13, when:'50w'}
];
var PYMK=[
  {name:'Nikki Jam', mutual:3, reason:'You were both at Dark Star Orchestra · Ardmore'},
  {name:'Michael Berkey', mutual:12, reason:'You were both at Peach Fest'},
  {name:'Emily Walden Beaston', mutual:2, reason:'In the Mid-Atlantic chapter'},
  {name:'Evan Krohn', mutual:3, reason:'You were both at Musikfest · Zinzenplatz'},
  {name:'Roger Sideman', mutual:76, reason:'76 mutual heads'},
  {name:'Ruthy Doc', mutual:2, reason:'You were both at SteelStacks'},
  {name:'Rich Stoler', mutual:3, reason:'In your scene'},
  {name:'Andrew Ruiz', mutual:3, reason:'You were both at Grateful Fred'},
  {name:'Anna Elva', mutual:81, reason:'81 mutual heads'},
  {name:'Jerome Velosky', mutual:15, reason:'You were both at Oteil & Friends'}
];
var ALL=[
  {name:'Kara Diaz',mutual:34,note:'Lot artist · Mid-Atlantic'},
  {name:'Matt Hartle',mutual:104,note:'China Cats · Bay Area'},
  {name:'Robbie G.',mutual:88,note:'The Chancellor · Santa Cruz'},
  {name:'Luke Issa',mutual:16},{name:'Dana Richie-Mauro',mutual:33},{name:'Azar Issa',mutual:42},
  {name:'John Kramer',mutual:34},{name:'Maggie Lynn Abboud',mutual:46},{name:'Michele Murphy',mutual:100},
  {name:'Jennifer Singer',mutual:1},{name:'Robert Kuehner',mutual:45},{name:'Beth Schrack Matlock',mutual:16},
  {name:'Deborah Fetzer',mutual:75},{name:'Lara Bratt',mutual:61},{name:'Cindy Seibert',mutual:6},
  {name:'Lisa Nicolosi Sofranko',mutual:87},{name:'Steve Lieberman',mutual:25}
];
var BDAY_TODAY=[
  {name:'Charles Lafountain', date:'July 19, 1970', age:'56'},
  {name:'Paul Bonewicz', date:'July 19, 1968', age:'58'}
];
var BDAY_UP=[
  {name:'Jason Meigs', date:'July 21 · 56'},{name:'Scott N. Brown', date:'July 21'},
  {name:'Jodi LaBow', date:'July 21 · 58'},{name:'Jeff Ritchie', date:'July 22 · 48'},
  {name:'Kerstin Burgess', date:'July 22'},{name:'Fedaa Issa', date:'July 23'},{name:'John Malanca', date:'July 23'}
];
var LISTS=[{n:'Close heads',ic:'⭐'},{n:'Bus family',ic:'🚌'},{n:'Restricted',ic:'⛔'}];

/* ---------- render ---------- */
var CUR='home';
function go(s){ CUR=s; document.querySelectorAll('#nav a').forEach(function(a){a.classList.toggle('on',a.dataset.s===s);});
  var m=document.getElementById('main');
  if(s==='home') m.innerHTML=vHome();
  else if(s==='requests') m.innerHTML=vRequests();
  else if(s==='suggestions') m.innerHTML=vSuggestions();
  else if(s==='all') m.innerHTML=vAll();
  else if(s==='birthdays') m.innerHTML=vBirthdays();
  else if(s==='lists') m.innerHTML=vLists();
  window.scrollTo(0,0);
}
function reqCard(r,i){ return '<div class="fcard" id="req-'+i+'"><div class="ph" style="background:'+grad(i)+'">'+mono(r.name)+'</div>'+
  '<div class="bd"><div class="nm">'+esc(r.name)+'</div><div class="mu">'+heads(r.mutual)+' '+r.mutual+' mutual heads</div>'+
  '<button class="btn primary" onclick="confirmReq('+i+')">Confirm</button>'+
  '<button class="btn sub" onclick="deleteReq('+i+')">Delete</button></div></div>'; }
function pymkCard(p,i){ return '<div class="fcard" id="pk-'+i+'"><div class="ph" style="background:'+grad(i+2)+'">'+mono(p.name)+'</div>'+
  '<div class="bd"><div class="nm">'+esc(p.name)+'</div><div class="mu">'+heads(p.mutual)+' '+p.mutual+' mutual heads</div>'+
  '<button class="btn primary" onclick="addFriend(\'pk-'+i+'\')">Add friend</button>'+
  '<button class="btn sub" onclick="removeCard(\'pk-'+i+'\')">Remove</button></div></div>'; }

function vHome(){
  return '<div class="invitebanner"><div style="font-size:34px">🌹</div><div class="txt"><b>Invite friends</b><span>Invite 10 Deadheads — grow your family, climb the Cookie leaderboard.</span></div><button onclick="inviteFriends()">Invite friends ›</button></div>'+
    '<div class="sechead"><h2>Friend requests</h2><span class="seeall" onclick="go(\'requests\')">See all</span></div>'+
    '<div class="grid">'+REQS.map(reqCard).join('')+'</div>'+
    '<div class="divider"></div>'+
    '<div class="sechead"><h2>People you may know</h2><span class="seeall" onclick="go(\'suggestions\')">See all</span></div>'+
    '<div class="grid">'+PYMK.map(pymkCard).join('')+'</div>';
}
function vRequests(){
  return '<h2>Friend requests</h2><div class="sub">'+REQS.length+' friend requests</div>'+
    REQS.map(function(r,i){ return '<div class="row" id="rr-'+i+'"><div class="av" style="background:'+grad(i)+'">'+mono(r.name)+'</div>'+
      '<div class="info"><b>'+esc(r.name)+'</b><span>'+heads(r.mutual)+' '+r.mutual+' mutual heads · '+r.when+'</span></div>'+
      '<div class="acts"><button class="rbtn" onclick="confirmRow(\'rr-'+i+'\',\''+esc(r.name)+'\')">Confirm</button>'+
      '<button class="rbtn g" onclick="removeCard(\'rr-'+i+'\')">Delete</button></div></div>'; }).join('');
}
function vSuggestions(){
  return '<h2>Suggestions</h2><div class="sub">People you may know</div>'+
    PYMK.map(function(p,i){ return '<div class="row" id="sr-'+i+'"><div class="av" style="background:'+grad(i+2)+'">'+mono(p.name)+'</div>'+
      '<div class="info"><b>'+esc(p.name)+'</b><span>'+esc(p.reason)+'</span></div>'+
      '<div class="acts"><button class="rbtn" onclick="addFriend(\'sr-'+i+'\')">Add friend</button>'+
      '<button class="rbtn g" onclick="removeCard(\'sr-'+i+'\')">Remove</button></div></div>'; }).join('');
}
function vAll(){
  return '<h2>All friends</h2><div class="sub">'+ALL.length+' friends</div>'+
    ALL.map(function(f,i){ return '<div class="row"><div class="av" style="background:'+grad(i)+'">'+mono(f.name)+'</div>'+
      '<div class="info"><b>'+esc(f.name)+'</b><span>'+(f.note?esc(f.note)+' · ':'')+f.mutual+' mutual head'+(f.mutual===1?'':'s')+'</span></div>'+
      '<div class="acts"><button class="kebab" onclick="toast(\'Options — unfriend, add to a list, message\')">⋯</button></div></div>'; }).join('');
}
function vBirthdays(){
  var today=BDAY_TODAY.map(function(b,i){ return '<div class="row"><div class="av" style="background:'+grad(i)+'">'+mono(b.name)+'</div>'+
    '<div class="info"><b>'+esc(b.name)+'</b><span>🎂 Today · '+esc(b.date)+(b.age?' · '+b.age:'')+'</span></div>'+
    '<div class="acts"><button class="rbtn" onclick="toast(\'🎉 Wish '+esc(b.name.split(' ')[0])+' a happy birthday\')">🎂 Wish</button></div></div>'; }).join('');
  var up=BDAY_UP.map(function(b,i){ return '<div class="row"><div class="av sm" style="background:'+grad(i+1)+'">'+mono(b.name)+'</div>'+
    '<div class="info"><b>'+esc(b.name)+'</b><span>'+esc(b.date)+'</span></div>'+
    '<div class="acts"><button class="rbtn g" onclick="toast(\'💬 Message '+esc(b.name.split(' ')[0])+'\')">💬 Message</button></div></div>'; }).join('');
  return '<h2>🎂 Today\'s birthdays</h2><div class="sub">Send a rose 🌹</div>'+today+
    '<div class="divider"></div><h2>Upcoming birthdays</h2><div class="sub">The next few on the bus</div>'+up;
}
function vLists(){
  return '<div class="sechead"><h2>Custom lists</h2><span class="seeall" onclick="createList()">＋ Create list</span></div>'+
    '<div class="sub">Group your heads — close friends, your bus family, a chapter.</div>'+
    LISTS.map(function(l,i){ return '<div class="row" onclick="toast(\'Open list: '+esc(l.n)+'\')" style="cursor:pointer"><div class="av" style="background:'+grad(i+2)+'">'+l.ic+'</div>'+
      '<div class="info"><b>'+esc(l.n)+'</b><span>Tap to view heads in this list</span></div><div class="acts"><span class="chev" style="color:var(--muted);font-size:20px">›</span></div></div>'; }).join('')+
    '<div class="row" onclick="createList()" style="cursor:pointer"><div class="av" style="background:#efe9f8;color:var(--accent)">＋</div><div class="info"><b style="color:var(--accent)">Create list</b><span>Start a new custom list</span></div></div>';
}

/* ---------- actions ---------- */
function fade(id){ var el=document.getElementById(id); if(el){ el.style.transition='.25s'; el.style.opacity=0; el.style.transform='scale(.96)'; setTimeout(function(){ if(el&&el.parentNode)el.parentNode.removeChild(el); },240); } }
function confirmReq(i){ var el=document.getElementById('req-'+i); if(el){ el.querySelector('.bd').innerHTML='<div class="nm">'+esc(REQS[i].name)+'</div><div class="mu" style="color:var(--ok);font-weight:800">🌹 You\'re friends now</div>'; } toast('🌹 You\'re friends with '+REQS[i].name); }
function deleteReq(i){ fade('req-'+i); toast('Request deleted.'); }
function confirmRow(id,nm){ var el=document.getElementById(id); if(el){ el.querySelector('.acts').innerHTML='<span style="color:var(--ok);font-weight:800;font-size:13px">🌹 Friends</span>'; } toast('🌹 You\'re friends with '+nm); }
function addFriend(id){ var el=document.getElementById(id); if(!el)return; var host=el.querySelector('.bd')||el.querySelector('.acts');
  var btn=el.querySelector('.btn.primary')||el.querySelector('.rbtn'); if(btn){ btn.textContent='✓ Requested'; btn.disabled=true; btn.style.opacity=.6; } toast('🌹 Friend request sent'); }
function removeCard(id){ fade(id); toast('Removed.'); }
function createList(){ var n=prompt('Name your list (e.g., Close heads, Bus family):'); if(n&&n.trim()){ LISTS.push({n:n.trim(),ic:'🌹'}); go('lists'); toast('List created: '+n.trim()); } }

/* invite — the reason this is the landing page: grow the family */
function inviteFriends(){
  var link='https://deaddance.app/?utm_source=invite&utm_medium=friends&utm_campaign=family_invite';
  try{ var P=window.parent&&window.parent!==window?window.parent:null;
    if(P&&P.ddLaunchPost){ P.ddLaunchPost(); return; }
    if(P&&P.inviteLink){ link=P.inviteLink(); }
  }catch(e){}
  var msg='Come see what we built — the whole Grateful Dead & jam family on one map. 🌹 '+link;
  if(navigator.share){ navigator.share({title:'DeadDance',text:'Join the family on DeadDance 🌹',url:link}).catch(function(){}); return; }
  try{ if(navigator.clipboard){ navigator.clipboard.writeText(msg); toast('🌹 Invite link copied — paste it to your heads'); return; } }catch(e){}
  toast('🌹 Share: '+link);
}
/* settings */
function togPop(e){ e.stopPropagation(); document.getElementById('pop').classList.toggle('on'); }
document.addEventListener('click',function(){ var p=document.getElementById('pop'); if(p)p.classList.remove('on'); });
function togDots(){ var sw=document.getElementById('dotSw'); var on=!sw.classList.contains('on'); sw.classList.toggle('on',on);
  try{ localStorage.setItem('dd.friends.dots', on?'1':'0'); }catch(e){} toast(on?'Notification dots on':'Notification dots off'); }
(function(){ try{ if(localStorage.getItem('dd.friends.dots')==='0') document.getElementById('dotSw').classList.remove('on'); }catch(e){} })();

/* toast */
function toast(m){ var t=document.createElement('div'); t.textContent=m;
  t.style.cssText='position:fixed;left:50%;bottom:26px;transform:translateX(-50%);background:#1b1e26;color:#fff;padding:11px 18px;border-radius:12px;font-weight:700;font-size:13.5px;z-index:99;box-shadow:0 10px 30px #0006';
  document.body.appendChild(t); setTimeout(function(){ t.style.transition='.35s'; t.style.opacity=0; setTimeout(function(){t.remove();},360); },2200); }

/* pull real requests/suggestions if the app's data layer is present (parent) */
try{
  var P=window.parent&&window.parent!==window?window.parent:null;
  if(P&&P.DDPymk&&P.DDPymk.suggestions){ P.DDPymk.suggestions(10).then(function(list){ if(list&&list.length){ PYMK=list.map(function(x){return {name:x.name,mutual:x.mutual||0,reason:x.reason||'In your scene'};}); if(CUR==='home'||CUR==='suggestions') go(CUR); } }); }
}catch(e){}

go('home');
</script>
</body></html>
