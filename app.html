<style>

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:var(--body);background:var(--paper);color:var(--ink);padding-bottom:64px}
.top{position:sticky;top:0;z-index:30;background:var(--purple);color:#fff;display:flex;align-items:center;gap:10px;padding:9px 14px;box-shadow:0 2px 8px #0004}

.av{width:34px;height:34px;border-radius:50%;background:var(--gold);color:var(--purple);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;cursor:pointer;flex:none}
.wrap{max-width:680px;margin:0 auto;padding:14px 12px 30px}

.post .ph{height:190px;background:linear-gradient(135deg,#2a1b3d22,#d8a24a33);display:flex;align-items:center;justify-content:center;font-size:58px}

a{color:inherit}

/* 🌹 dead_dance — the namesake event, special in the widget: dancers + bursting stars */
.ddparty{position:relative;overflow:hidden;cursor:pointer;padding:13px;border-bottom:1px solid var(--line);background:linear-gradient(115deg,#3c2a54,#2a1b3d 70%,#4a2e6e);color:#fff;box-shadow:inset 0 0 24px #d8a24a22}

.ddparty .dancers span:nth-child(2){animation-delay:.2s}.ddparty .dancers span:nth-child(3){animation-delay:.4s}.ddparty .dancers span:nth-child(4){animation-delay:.6s}
@keyframes ddbob{0%,100%{transform:translateY(0) rotate(-7deg)}50%{transform:translateY(-6px) rotate(7deg)}}
.ddparty .star{position:absolute;font-size:13px;opacity:0;pointer-events:none;animation:ddburst 1.7s ease-out infinite}

.rbud{position:relative;text-align:center;padding:4px 0 2px;height:40px}

.rbud .star{position:absolute;font-size:12px;opacity:0;pointer-events:none;animation:ddburst 1.9s ease-out infinite}

/* ---- 💼 MUSICIAN'S BOOKS — WIN THE MUSICIANS. Mileage tracks automatically off their gigs; they
   snap a receipt (hotel / gas / amp rental) and we file it. HIDE the bookkeeping, show the payoff:
   costs + a tax-ready mileage deduction. Net it against their ticket take so they see the real number. ---- */
var MEXP=(function(){try{var s=localStorage.getItem("dd.mexp");if(s){var o=JSON.parse(s);if(o&&typeof o==="object")return {exp:o.exp||[],mi:o.mi||[],hrs:o.hrs||[],rate:(+o.rate||0)};}}catch(e){}return {exp:[],mi:[],hrs:[],rate:0};})();
function saveMexp(){try{localStorage.setItem("dd.mexp",JSON.stringify({exp:MEXP.exp.slice(0,500),mi:MEXP.mi.slice(0,500),hrs:MEXP.hrs.slice(0,500),rate:MEXP.rate}));}catch(e){}}
var MILE_RATE=0.70; /* standard mileage rate — confirm current tax year */
function mexpMiles(){return MEXP.mi.reduce(function(a,m){return a+(+m.miles||0);},0);}
function mexpCosts(){return MEXP.exp.reduce(function(a,e){return a+(+e.amount||0);},0);}
function mexpAddMile(label,miles){MEXP.mi.unshift({label:label,miles:miles,ts:Date.now()});saveMexp();}
/* ⏱ YOUR TIME — setup, drive, teardown, rehearsal. Hours × your rate. Honest split:
   PAID crew hours are a deductible labor expense; YOUR OWN unpaid time is NOT deductible
   (you can't write off your own labor) — but it's your truest cost, so we surface effective $/hr. */
function mexpRate(){return +MEXP.rate||0;}
function mexpSetRate(v){MEXP.rate=Math.max(0,+v||0);saveMexp();}
function mexpHours(paid){return MEXP.hrs.reduce(function(a,h){return a+((paid==null||!!h.paid===!!paid)?(+h.hours||0):0);},0);}
function mexpLabor(paid){return mexpHours(paid)*mexpRate();}
function mexpAddHours(kind,hours,paid){MEXP.hrs.unshift({kind:kind,hours:+hours||0,paid:!!paid,rate:mexpRate(),ts:Date.now()});saveMexp();}

/* ---- 📊 MUSICIAN VENUE ANALYSIS — plain information: which rooms pay, which are dogs, and where
   you're charging UNDER the room average (money left on the table). YOU set your price; we inform. ---- */
function venueAnalysis(bandId,bandName){
 var b=bandById(bandId);var yourPrice=(TIX[bandId]&&TIX[bandId].price)||22;
 var all=(typeof VENUES!=="undefined"?VENUES:[]);
 var pool=all.filter(function(v){return b&&(b.region==="national"||v[3]===b.region);});
 if(pool.length<6)pool=pool.concat(all.slice(0,8));
 var seen={},rows=[];
 pool.forEach(function(v){ if(seen[v[0]])return;seen[v[0]]=1;
   var h=0,str=bandId+"|"+v[0];for(var i=0;i<str.length;i++)h=(h*31+str.charCodeAt(i))>>>0;
   rows.push({venue:v[0],city:v[1],st:v[2],nights:1+(h%6),crowd:60+(h%240),venueAvg:15+(h%26),take:300+(h%2200),your:yourPrice});
 });
 if(!rows.length){toast("Add a few gigs and your venue analysis fills in.");return;}
 rows.sort(function(a,b){return b.take-a.take;});
 var best=rows.slice(0,3),dogs=rows.slice(-3).reverse();
 var under=rows.filter(function(r){return r.your<r.venueAvg-2;}).sort(function(a,b){return (b.venueAvg-b.your)*b.crowd-(a.venueAvg-a.your)*a.crowd;}).slice(0,4);
 var card=function(r){return '<div class="card pad" style="padding:9px 12px"><div class="row" style="gap:8px"><div style="flex:1;font-size:13.5px"><b>'+esc(r.venue)+'</b><div class="muted" style="font-size:11.5px">'+esc(r.city)+', '+esc(r.st)+' · '+r.nights+' night'+(r.nights>1?'s':'')+' · ~'+r.crowd+' heads</div></div><div style="text-align:right"><b>'+tmoney(r.take)+'</b><div class="muted" style="font-size:10.5px">avg/night</div></div></div></div>';};
 document.getElementById("sheet").innerHTML='<h3>📊 Where you make money'+(bandName?(' — '+esc(bandName)):'')+'</h3>'+
  '<div class="sb">The rooms that pay, the rooms that don\'t, and where you\'re leaving money on the table. Plain info, no spin.</div>'+

  (under.length?('<div class="sec-h" style="margin-top:10px">💸 You\'re charging under the room</div>'+under.map(function(r){var upside=(r.venueAvg-r.your)*r.crowd;return '<div class="card pad" style="padding:9px 12px;border-left:3px solid var(--gold)"><div style="font-size:13.5px"><b>'+esc(r.venue)+'</b> — you charge <b>'+tmoney(r.your)+'</b>, the room averages <b>'+tmoney(r.venueAvg)+'</b>.</div><div class="muted" style="font-size:11.5px;margin-top:2px">Match the average and that\'s ~<b>'+tmoney(upside)+'</b> more a night you\'re leaving on the table.</div></div>';}).join("")):'')+
  '<div class="note" style="margin-top:10px">Honest-state: representative until your real gig history accrues — then it runs off YOUR actual nights + the room\'s real averages. Information for you; you set your price.</div>'+
  '<button class="close" onclick="closeModal()">Done</button>';
 document.getElementById("ovl").classList.add("on");
}
/* ---- 📈 MUSICIAN P&L — month / quarter / year. We do the accounting; they read one number.
   Revenue (gig income + tips) − Expenses (logged receipts + mileage deduction + touring costs) = Net. ---- */
var PNL_PERIOD="month";
function pnlScale(p){return p==="year"?12:p==="quarter"?3:1;}
function pnlSet(p,bandName){PNL_PERIOD=p;pnlSheet(bandName);}
function pnlSheet(bandName){
 var k=pnlScale(PNL_PERIOD),plabel=PNL_PERIOD==="year"?"This year":PNL_PERIOD==="quarter"?"This quarter":"This month";
 var gigs=Math.max((typeof BANDPOSTS!=="undefined"?BANDPOSTS.length:0),4), avgTake=1200;
 var tips=(typeof TIPS!=="undefined"&&TIPS.total)?TIPS.total:0;
 var GI=Math.round(gigs*avgTake*k), TI=Math.round(tips*k), R=GI+TI;
 var Elog=Math.round(mexpCosts()), Emile=Math.round(mexpMiles()*MILE_RATE), Epaid=Math.round(mexpLabor(true)), Eother=Math.round(650*k), E=Elog+Emile+Epaid+Eother, N=R-E;
 var ownHrs=mexpHours(false), Town=Math.round(mexpLabor(false)), Nafter=N-Town, effHr=ownHrs>0?N/ownHrs:0;
 var tab=function(p,lbl){return '<button class="btn sm'+(PNL_PERIOD===p?" gold":" ghost")+'" onclick="pnlSet(\''+p+'\',\''+escA(bandName||"")+'\')">'+lbl+'</button>';};
 var line=function(lbl,amt,bold){return '<div class="row" style="gap:8px;padding:5px 0;border-top:1px solid var(--line)"><div style="flex:1;font-size:13px'+(bold?";font-weight:800":"")+'">'+esc(lbl)+'</div><div style="font-weight:'+(bold?800:600)+'">'+tmoney(amt)+'</div></div>';};
 document.getElementById("sheet").innerHTML='<h3>📈 P&amp;L'+(bandName?(' — '+esc(bandName)):'')+'</h3>'+
  '<div class="sb">Your books, totaled. We do the accounting — you read one number.</div>'+
  '<div class="row" style="gap:6px;margin-bottom:9px">'+tab("month","Month")+tab("quarter","Quarter")+tab("year","Year")+'</div>'+
  '<div class="sec-h">Revenue · '+esc(plabel.toLowerCase())+'</div><div class="card pad" style="padding:4px 12px">'+line("Gig income",GI)+line("Tips",TI)+line("Total revenue",R,true)+'</div>'+
  '<div class="sec-h" style="margin-top:10px">Expenses</div><div class="card pad" style="padding:4px 12px">'+line("Logged receipts",Elog)+line("Mileage deduction ("+Math.round(mexpMiles())+" mi)",Emile)+(Epaid>0?line("Crew / labor paid ("+Math.round(mexpHours(true)*10)/10+" hrs)",Epaid):"")+line("Other touring costs",Eother)+line("Total expenses",E,true)+'</div>'+
  '<div class="card pad" style="margin-top:10px;background:linear-gradient(180deg,'+(N>=0?"#3b6b4a22":"#b02a4822")+',#fffaf2);text-align:center"><div class="muted" style="font-size:11px">Net profit · '+esc(plabel.toLowerCase())+'</div><div style="font-size:28px;font-weight:800;color:'+(N>=0?"#2a6b46":"#b02a48")+'">'+tmoney(N)+'</div></div>'+
  (ownHrs>0?('<div class="card pad" style="margin-top:10px;background:linear-gradient(180deg,#5b3b6b18,#fffaf2)"><div class="sec-h" style="margin-top:0">⏱ Your own time</div>'+line((Math.round(ownHrs*10)/10)+" hrs @ "+(mexpRate()?tmoney(mexpRate()):"set a rate"),Town)+line("Net after your time",Nafter,true)+'<div class="row" style="gap:8px;padding:5px 0;border-top:1px solid var(--line)"><div style="flex:1;font-size:13px">Effective pay</div><div style="font-weight:700">'+(effHr?(tmoney(effHr)+"/hr"):"—")+'</div></div><div class="muted" style="font-size:10.5px;padding-top:4px">Your own unpaid time isn\'t tax-deductible — but it\'s your truest cost, so we show what you really make per hour. Paid crew above IS deductible.</div></div>'):'')+
  '<div class="note" style="margin-top:10px">Honest-state: representative figures that fill in from your real takes, tips, receipts &amp; miles as they accrue. A clean export for your accountant ships with accounts. Not tax advice.</div>'+

 document.getElementById("ovl").classList.add("on");
}

/* ---- 🎶 dead_dance PROGRAM scheduler — pick the SHOW, fill the window with BONUS SETS.
   ONLY for the dead_dance EVENT (the namesake circle), never the main archive. Robbie books,
   say, 6–9pm (180 min); not every show fills it, so he adds a bonus set from a DIFFERENT show.
   A "set" here is a real set off a real show (SET 1 / SET 2). Lengths are representative. ---- */
var DDPROG={programMin:180,showId:null,bonus:[]};
function ddShowById(id){for(var i=0;i<GD_SHOWS.length;i++)if(GD_SHOWS[i].id===id)return GD_SHOWS[i];return null;}
function ddSetLen(sh,i){if(!sh||!sh.sets||!sh.sets[i])return 0;return Math.max(35,Math.round(sh.sets[i].songs.length*9/5)*5);} /* ~9 min/song, 5-min granularity */
function ddShowLen(id){var sh=ddShowById(id);if(!sh||!sh.sets)return 0;var t=0;for(var i=0;i<sh.sets.length;i++)t+=ddSetLen(sh,i);return t;}
function ddBonusLen(){return DDPROG.bonus.reduce(function(a,b){return a+ddSetLen(ddShowById(b.showId),b.setIdx);},0);}
function ddFilled(){return (DDPROG.showId?ddShowLen(DDPROG.showId):0)+ddBonusLen();}
function ddShowLabel(sh){return sh.date+" · "+sh.venue;}
function ddProgInit(){DDPROG={programMin:180,showId:null,bonus:[]};}
function ddProgPaint(){var h=document.getElementById("ddProgram");if(h)h.innerHTML=ddProgBody();}
function ddSetProgLen(){var v=+((document.getElementById("ddPMin")||{}).value);DDPROG.programMin=Math.max(30,Math.min(360,v||180));ddProgPaint();}
function ddPickShow(){DDPROG.showId=(document.getElementById("ddShowSel")||{}).value||null;DDPROG.bonus=[];ddProgPaint();}
function ddAddBonus(){var v=(document.getElementById("ddBonusSel")||{}).value;if(!v)return;var p=v.split(":");DDPROG.bonus.push({showId:p[0],setIdx:+p[1]});ddProgPaint();}
function ddRemoveBonus(i){DDPROG.bonus.splice(i,1);ddProgPaint();}
function ddProgBody(){
 var filled=ddFilled(),rem=DDPROG.programMin-filled,pct=Math.max(0,Math.min(100,Math.round(filled/DDPROG.programMin*100)));
 var showOpts='<option value="">— pick the show —</option>'+GD_SHOWS.map(function(s){return '<option value="'+s.id+'"'+(DDPROG.showId===s.id?' selected':'')+'>'+esc(ddShowLabel(s))+' (~'+ddShowLen(s.id)+' min)</option>';}).join("");
 var html='<div class="sec-h" style="margin-top:8px">🎶 The music program</div>'+
   '<div class="muted" style="font-size:11.5px;margin-bottom:4px">Program length (min) — 6–9pm = 180</div><input id="ddPMin" type="number" value="'+DDPROG.programMin+'" onchange="ddSetProgLen()" style="width:100%;background:var(--cream);border:1px solid var(--line);border-radius:8px;padding:9px 12px;font-size:14px;margin-bottom:8px">'+
   '<div class="muted" style="font-size:11.5px;margin-bottom:4px">Pick the show</div><select id="ddShowSel" onchange="ddPickShow()" style="width:100%;background:var(--cream);border:1px solid var(--line);border-radius:8px;padding:9px 12px;font-size:14px;margin-bottom:8px">'+showOpts+'</select>';
 if(DDPROG.showId){
  var sh=ddShowById(DDPROG.showId);
  html+='<div class="card pad" style="padding:10px 12px"><b style="font-size:13px">'+esc(ddShowLabel(sh))+'</b>'+(sh.sets||[]).map(function(st,i){return '<div class="muted" style="font-size:12px">• '+esc(st.name)+' (~'+ddSetLen(sh,i)+' min)</div>';}).join("")+'</div>';
  DDPROG.bonus.forEach(function(b,i){var bs=ddShowById(b.showId);html+='<div class="row" style="gap:8px;margin-top:6px;align-items:center"><span class="chip purple">🎁 bonus set</span><div style="flex:1;font-size:12.5px">'+esc(bs.date+" — "+bs.sets[b.setIdx].name)+' (~'+ddSetLen(bs,b.setIdx)+' min)</div><button class="minib" onclick="ddRemoveBonus('+i+')">✕</button></div>';});
  var col=rem>15?"var(--gold-deep)":"#3b6b4a";
  html+='<div style="margin-top:10px"><div style="height:9px;background:#e6dccb;border-radius:6px;overflow:hidden"><div style="height:100%;width:'+pct+'%;background:'+col+'"></div></div>'+
    '<div class="muted" style="font-size:12px;margin-top:4px">Filled <b>'+filled+'</b> / '+DDPROG.programMin+' min'+(rem>15?(' — <b>'+rem+' min short</b>, add a bonus set'):(rem<-5?(' — '+(-rem)+' min over'):' — ✓ full'))+'</div></div>';
  if(rem>15){
   var bo='<option value="">— add a bonus set from another show —</option>';
   GD_SHOWS.forEach(function(s){if(s.id===DDPROG.showId)return;(s.sets||[]).forEach(function(st,i){bo+='<option value="'+s.id+':'+i+'">'+esc(s.date+" — "+st.name)+' (~'+ddSetLen(s,i)+' min)</option>';});});
   html+='<select id="ddBonusSel" onchange="ddAddBonus()" style="width:100%;background:var(--cream);border:1px solid var(--line);border-radius:8px;padding:9px 12px;font-size:13.5px;margin-top:8px">'+bo+'</select>';
  }
 }
 return html;
}

function checkInEvent(id){

var FRIENDS=(function(){try{var s=localStorage.getItem("dd.friends");if(s){var o=JSON.parse(s);if(o&&typeof o==="object")return o;}}catch(e){}return {michele:"pending_in"};})(); /* seed one incoming so Accept is demoable */

function friendRoster(){var out=[];for(var h in FOUNDERS){if(h===WHO)continue;out.push({h:h,name:FOUNDERS[h].full,title:FOUNDERS[h].title,initials:FOUNDERS[h].initials});}return out;}
function friendStatus(h){return FRIENDS[h]||"none";}
function friendCount(){var n=0;for(var h in FRIENDS)if(FRIENDS[h]==="friends")n++;return n;}
function friendAct(h){var s=friendStatus(h);
 if(s==="none")FRIENDS[h]="pending_out";else if(s==="pending_in")FRIENDS[h]="friends";else delete FRIENDS[h];
 saveFriends();render();
 toast(FRIENDS[h]==="friends"?("🤝 You and "+FOUNDERS[h].first+" are friends"):FRIENDS[h]==="pending_out"?("🌹 Friend request sent to "+FOUNDERS[h].first):"Removed");}
function friendBtn(h){var s=friendStatus(h);
 if(s==="friends")return '<button class="minib" onclick="friendAct(\''+h+'\')">🤝 Friends</button>';
 if(s==="pending_out")return '<button class="minib" onclick="friendAct(\''+h+'\')">⏳ Requested</button>';
 if(s==="pending_in")return '<button class="minib rose" onclick="friendAct(\''+h+'\')">✓ Accept</button>';
 return '<button class="minib" onclick="friendAct(\''+h+'\')">+ Add friend</button>';}
