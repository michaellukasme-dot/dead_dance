<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>SetList — Dark Star Orchestra (live) — DeadDance</title>
<meta property="og:title" content="SetList 🌌 — Dark Star Orchestra, show by show">
<meta property="og:description" content="Every recent DSO show, the setlist, and the historic Grateful Dead night it recreated.">
<meta property="og:image" content="https://deaddance.app/stealie_qr.png">
<style>
  :root{--bg:#0e0b14;--rose:#b8002e;--mut:#b9a9e0;--card:#17122b;--gold:#ffd76a}
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--bg);color:#fff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;line-height:1.5}
  .wrap{max-width:780px;margin:0 auto;padding:0 16px 70px}
  header{text-align:center;padding:22px 12px 4px}
  header h1{font-size:clamp(21px,4.4vw,30px);font-weight:900;margin:0}
  header .s{color:var(--mut);font-size:13px;margin-top:4px}
  .card{background:var(--card);border:1px solid #ffffff12;border-radius:14px;padding:13px 15px;margin:11px 0}
  .top{display:flex;justify-content:space-between;align-items:baseline;gap:10px}
  .dt{font-weight:900;font-size:15px}
  .nn{color:#8f7bbf;font-size:11px;font-weight:800}
  .vn{color:#e8dcff;font-size:13.5px}
  .rec{margin-top:7px;font-size:12.5px;font-weight:800;color:var(--gold)}
  .set{margin-top:6px;font-size:12.5px;color:#cdbdf0;font-style:italic}
  .nt{margin-top:5px;font-size:12px;color:#9a86c6}
  .cite{color:#7a6aa0;font-size:11.5px;text-align:center;margin-top:22px;line-height:1.5}
  .back{display:inline-block;margin:12px 0 0;color:#a071ff;text-decoration:none;font-weight:800;font-size:13px}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>🌌 SetList — Dark Star Orchestra</h1>
    <div class="s">Recent shows · the setlist · and the Grateful Dead night each one recreated</div>
  </header>
  <div id="feed"></div>
  <a class="back" href="index.html">‹ Back to DeadDance</a>
  <div class="cite" id="cite"></div>
</div>

<script src="dd_history.js"></script>
<script>
(function(){
  var H=window.DDHistory; function esc(s){return String(s||'').replace(/[<>&]/g,'');}
  function row(s){
    var gd=H.gdByDate(s.recreates);
    var rec = s.recreates ? ('▶ Played the Grateful Dead’s <b>'+esc(s.recreates)+'</b>'+(gd?(' — '+esc(gd.venue)+', '+esc(gd.city)):'')) : '▶ An elective set (DSO’s own build from the Dead songbook)';
    return '<div class="card"><div class="top"><span class="dt">'+esc(s.date)+'</span>'+(s.n?'<span class="nn">DSO #'+s.n+'</span>':'')+'</div>'+
      '<div class="vn">'+esc(s.venue)+' · '+esc(s.city)+'</div>'+
      '<div class="rec">'+rec+'</div>'+
      (s.set?'<div class="set">Set 1: '+esc(s.set)+'</div>':'')+
      (s.note?'<div class="nt">'+esc(s.note)+'</div>':'')+'</div>';
  }
  document.getElementById('feed').innerHTML = H.recent(30).map(row).join('');
  document.getElementById('cite').innerHTML = 'Data: '+esc(H.source||'')+'.<br>Setlist data shown “as is,” credited to its sources. Full ~3,300-show history via licensed ingestion.';
})();
</script>
</body>
</html>
