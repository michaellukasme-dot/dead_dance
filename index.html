<style>

body{font-family:var(--body);background:var(--paper);color:var(--ink);padding-bottom:64px}
.top{position:sticky;top:0;z-index:30;background:var(--purple);color:#fff;display:flex;align-items:center;gap:10px;padding:9px 14px;box-shadow:0 2px 8px #0004}

.wrap{max-width:680px;margin:0 auto;padding:14px 12px 30px}

a{color:inherit}

/* 🌹 dead_dance — the namesake event, special in the widget: dancers + bursting stars */
.ddparty{position:relative;overflow:hidden;cursor:pointer;padding:13px;border-bottom:1px solid var(--line);background:linear-gradient(115deg,#3c2a54,#2a1b3d 70%,#4a2e6e);color:#fff;box-shadow:inset 0 0 24px #d8a24a22}

.ddparty .dancers span:nth-child(2){animation-delay:.2s}.ddparty .dancers span:nth-child(3){animation-delay:.4s}.ddparty .dancers span:nth-child(4){animation-delay:.6s}
@keyframes ddbob{0%,100%{transform:translateY(0) rotate(-7deg)}50%{transform:translateY(-6px) rotate(7deg)}}

function feedCard(p,i){return '<div class="card post"><div class="pad"><div class="row"><div class="av" style="background:#ece3f4;color:var(--purple)">'+esc(p.av)+'</div>'+

/* ---- 📊 MUSICIAN VENUE ANALYSIS — plain information: which rooms pay, which are dogs, and where

function venueAnalysis(bandId,bandName){
 var b=bandById(bandId);var yourPrice=(TIX[bandId]&&TIX[bandId].price)||22;
 var all=(typeof VENUES!=="undefined"?VENUES:[]);
 var pool=all.filter(function(v){return b&&(b.region==="national"||v[3]===b.region);});
 if(pool.length<6)pool=pool.concat(all.slice(0,8));
 var seen={},rows=[];
 pool.forEach(function(v){ if(seen[v[0]])return;seen[v[0]]=1;
   var h=0,str=bandId+"|"+v[0];for(var i=0;i<str.length;i++)h=(h*31+str.charCodeAt(i))>>>0;
   rows.push({venue:v[0],city:v[1],st:v[2],nights:1+(h%6),crowd:60+(h%240),venueAvg:15+(h%26),take:300+(h%2200),your:yourPrice});
 });
 if(!rows.length){toast("Add a few gigs and your venue analysis fills in.");return;}
 rows.sort(function(a,b){return b.take-a.take;});
 var best=rows.slice(0,3),dogs=rows.slice(-3).reverse();
 var under=rows.filter(function(r){return r.your<r.venueAvg-2;}).sort(function(a,b){return (b.venueAvg-b.your)*b.crowd-(a.venueAvg-a.your)*a.crowd;}).slice(0,4);
 var card=function(r){return '<div class="card pad" style="padding:9px 12px"><div class="row" style="gap:8px"><div style="flex:1;font-size:13.5px"><b>'+esc(r.venue)+'</b><div class="muted" style="font-size:11.5px">'+esc(r.city)+', '+esc(r.st)+' · '+r.nights+' night'+(r.nights>1?'s':'')+' · ~'+r.crowd+' heads</div></div><div style="text-align:right"><b>'+tmoney(r.take)+'</b><div class="muted" style="font-size:10.5px">avg/night</div></div></div></div>';};
 document.getElementById("sheet").innerHTML='<h3>📊 Where you make money'+(bandName?(' — '+esc(bandName)):'')+'</h3>'+
  '<div class="sb">The rooms that pay, the rooms that don\'t, and where you\'re leaving money on the table. Plain info, no spin.</div>'+

   return '<div class="card">'+ids.map(function(id){var s=showById(id);if(!s)return"";return '<div class="show"><div class="ic">✓</div><div class="nm"><b>'+esc(s.venue)+'</b><div class="s">'+esc(s.date)+" · "+esc(s.city)+", "+esc(s.state||s.country)+'</div></div><button class="minib" onclick="room(\''+id+'\')">👥 who else</button></div>';}).join("")+'</div>';})()+
  '<div class="card list"><div class="it" onclick="farrah()"><div class="ic">🎙️</div><div class="nm"><b>Farrah</b><div class="s">Voice — route me to the show, hands-free</div></div></div>'+
   '<div class="it" onclick="toast(\'Settings (demo)\')"><div class="ic">⚙️</div><div class="nm"><b>Settings</b><div class="s">Notifications · privacy · install</div></div></div></div>';
}
function farrah(){

 try{if(window.speechSynthesis){var u=new SpeechSynthesisUtterance(line);u.rate=.96;u.pitch=1.05;speechSynthesis.cancel();speechSynthesis.speak(u);}}catch(e){}

/* ===================== "I Was There" — every show is a room ======================
   The viral core: mark the shows you caught → they roll into your badge → see who else

   real heads sign in (no private data, ever, without consent). */
var ATTENDED={s1:true,s6:true};               /* Robbie's a Philly head — Cornell + JFK '89 */
var HEADS_HERE={s0:760,s1:1240,s1b:210,s2:540,s3:430,s4:610,s5:880,s6:1510};
var ROSTER=["Kristen Young","TapeVault","Kara (Kara's Prints)","Philly Heads chapter","NorthEast Tapers","SugareeSue","Deadhead_Dave","Bay Area Family"];
function showById(id){for(var i=0;i<GD_SHOWS.length;i++)if(GD_SHOWS[i].id===id)return GD_SHOWS[i];return null;}
function fmt(n){return n>=1000?(n/1000).toFixed(1).replace(/\.0$/,"")+"k":(""+n);}
function headsHere(id){return (HEADS_HERE[id]||420)+(ATTENDED[id]?1:0);}
function renderIWT(){
 var c=document.getElementById("iwt"); if(!c)return;
 c.innerHTML='<div class="sec-h">🪪 I Was There — claim the shows you caught</div><div class="card">'+
  GD_SHOWS.map(function(s){var on=!!ATTENDED[s.id];
   return '<div class="show"><div class="ic">'+(on?"✓":"🎟️")+'</div><div class="nm"><b>'+esc(s.venue)+'</b>'+(on?' <span class="chip ok">You were here</span>':"")+

  }).join("")+'</div>'+
  '<div class="note"><b>Every show is a room.</b> Claim the ones you caught — they roll into your badge, and you can see who else was in that room with you. <i>Honest-state: rosters are representative demo data until heads sign in.</i></div>';
}
function toggleThere(id){var was=!!ATTENDED[id];ATTENDED[id]=!was;BADGE.shows+=was?-1:1;renderIWT();if(S.tab==="you")render();toast(was?"Removed from your badge.":"🌹 You were there — badge now reads "+BADGE.shows+" shows.");}
function room(id){var s=showById(id);if(!s)return;var on=!!ATTENDED[id];
 var faces=ROSTER.slice(0,6).map(function(nm){return '<div class="it"><div class="ic">'+esc(nm[0])+'</div><div class="nm"><b>'+esc(nm)+'</b><div class="s">was in the room</div></div></div>';}).join("");
 document.getElementById("sheet").innerHTML='<h3>'+esc(s.date)+" · "+esc(s.venue)+'</h3><div class="sb">'+esc(s.city)+", "+esc(s.state||s.country)+' · <b>'+fmt(headsHere(id))+' heads</b> say they were here</div>'+
  (on?'<div class="note" style="border-left-color:var(--ok);margin:0 0 11px">✓ You were here. This room is yours too.</div>':"")+
  '<div class="card list">'+faces+'</div>'+

  '<div class="note">Honest-state: this roster is representative demo data — when heads sign in, it becomes the real list of who shared that night. No private data, ever, without consent.</div>'+
  '<button class="close" onclick="closeModal()">Done</button>';
 document.getElementById("ovl").classList.add("on");
}

/* The Archive lives in a PERSISTENT panel (mounted once) so playback survives tab switches —
   the tape keeps rolling while you browse the feed, like a real music app. Themed dead_dance dusk. */
var archiveBuilt=false;
function buildArchive(){
 var p=document.getElementById("archivepanel");
 if(typeof CassetteReader==="undefined"){p.innerHTML='<div class="sec-h">📼 The Live Archive</div><div class="note">Couldn\'t load the cassette player (cassette-reader.js). Reload the page — the rest of dead_dance still works.</div>';archiveBuilt=true;return;}
 p.innerHTML='<div class="sec-h">📼 The Live Archive · plays right here in the app</div>'+
  '<div class="card" style="overflow:hidden"><div id="cassettehost"></div></div>'+
  '<div class="card pad"><div class="row"><div class="ic">🌹</div><div style="flex:1"><b>JGB — licensed catalog</b><div class="muted">Jerry Garcia Band · 750 shows · Buy / subscribe per show</div></div></div>'+
   '<button class="btn rose" style="display:block;width:100%;text-align:center;margin-top:12px" onclick="toast(\'JGB licensed catalog — per-show buy/subscribe wires in once Jerry Garcia Band licenses. Default-deny until then.\')">JGB catalog → licensing</button></div>'+
  '<div class="note"><b>Rights, not copies.</b> The cassette streams <b>band-sanctioned recordings from the Internet Archive</b> (the etree collection — taping always allowed). JGB and anything unlicensed stays <b>default-deny</b> — setlists are factual; those recordings stream only under the license the rights-holders grant.</div>'+
  '<div id="iwt"></div>';
 CassetteReader.mount(document.getElementById("cassettehost"),{
  brand:{name:"Every Show",sub:"Grateful Dead · live archive · in dead_dance",logo:"syf.png"},
  marketId:"dead_dance_archive",account:{id:"head1",region:"US"},
  theme:{tape:"#3c2a54",gold:"#d8a24a",rust:"#b5384e",blue:"#3f6fb0",paper:"#f3ece0",ink:"#241a2b",line:"#e6dccb"},
  shows:GD_SHOWS
 });
 renderIWT();
 archiveBuilt=true;
}
/* ---- 📍 Near You — the country is the dance floor. GPS → who's playing today/tomorrow within 50 mi.
   A self-aware Deadhead glance: one look, no click. Tap a show for the band's ad. Honest-state:
   shows are placed near your real location to demo the feature until the live tour feed is cleared. ---- */
var NEAR={loc:null,fallback:false,shows:[],open:false,shown:false};
function haversine(a,b,c,d){var R=3958.8,p=Math.PI/180,dla=(c-a)*p,dlo=(d-b)*p,la1=a*p,la2=c*p;var h=Math.sin(dla/2)*Math.sin(dla/2)+Math.cos(la1)*Math.cos(la2)*Math.sin(dlo/2)*Math.sin(dlo/2);return 2*R*Math.asin(Math.sqrt(h));}
function offsetPt(lat,lng,mi,brg){var R=3958.8,p=Math.PI/180,d=mi/R,b=brg*p,la1=lat*p,lo1=lng*p;var la2=Math.asin(Math.sin(la1)*Math.cos(d)+Math.cos(la1)*Math.sin(d)*Math.cos(b));var lo2=lo1+Math.atan2(Math.sin(b)*Math.sin(d)*Math.cos(la1),Math.cos(d)-Math.sin(la1)*Math.sin(la2));return {lat:la2/p,lng:lo2/p};}
/* the AD ENGINE powers Near You — each band registers its OWN ad (its copy, its ticket link);
   the house targets by geo + date. Honest-state: editorial priority, no paid auction. */
/* resilient: if ad-engine.js fails to load, Near You degrades to empty — the app never bricks */
var AD = (typeof AdEngine!=="undefined" && AdEngine.create) ? AdEngine.create()
  : {seed:function(){},serve:function(){return [];},track:function(){return false;},get:function(){return null;},stats:function(){return {impressions:0,clicks:0};},_ads:function(){return [];}};
AD.seed([
 {band:"Dark Star Orchestra",venue:"The Catalyst",demo:{mi:9,brg:35},when:0,time:"8:00 PM",priority:5,ad:"Dark Star Orchestra recreates a complete Grateful Dead show — full set list, different every night. Doors 7, show 8."},
 {band:"Melvin Seals & JGB",venue:"Moe's Alley",demo:{mi:23,brg:150},when:0,time:"9:00 PM",priority:4,ad:"Melvin Seals brings the Jerry Garcia Band fire — that B-3 organ all night long. Late set, dance shoes required."},
 {band:"The China Cats",venue:"Felton Music Hall",demo:{mi:37,brg:255},when:1,time:"8:30 PM",priority:6,ad:"Northern California's longest-running Dead tribute — Matt Hartle on the Jerry lead. Grateful Sundays energy."},
 {band:"Joe Russo's Almost Dead",venue:"Rio Theatre",demo:{mi:46,brg:310},when:1,time:"7:30 PM",priority:5,ad:"JRAD — the most fearless reinvention of the Dead songbook going. Loud, fast, joyous. Early show."}
]);
function dayLabel(w){return w===0?"today":"tomorrow";}
function genNear(lat,lng){return AD.serve({lat:lat,lng:lng,radiusMi:50}).map(function(a){return {id:a.id,band:a.band,venue:a.venue,dist:a._dist,when:a.when,time:a.time,ad:a.ad};});}
/* 🌹 the NAMESAKE event — a scheduled dead_dance bursts into the widget with dancers + stars */
function nearParties(){
 if(typeof EVENTS==="undefined"||!EVENTS.length)return "";
 var now=Date.now();
 var up=EVENTS.filter(function(e){return e.type==="deaddance"&&e.when>now&&(e.when-now)<36*3600*1000;}).sort(function(a,b){return a.when-b.when;});
 if(!up.length)return "";
 return up.slice(0,2).map(function(e){
   var revealAt=e.when-e.revealMin*60000, revealed=now>=revealAt, mins=Math.max(0,Math.round((e.when-now)/60000));
   var when=mins<60?("~"+mins+" min"):("~"+Math.round(mins/60)+" hr");
   return '<div class="ddparty" onclick="toggleNear();go(\'home\')">'+
     '<span class="star" style="top:6px;left:26%">✨</span><span class="star" style="top:22px;right:16%;animation-delay:.5s">🌟</span><span class="star" style="bottom:8px;left:60%;animation-delay:1s">✨</span><span class="star" style="top:9px;left:8%;animation-delay:.8s">⭐</span><span class="star" style="bottom:10px;right:34%;animation-delay:1.3s">💫</span>'+
     '<div class="dancers"><span>🕺</span><span>💃</span><span>🕺</span><span>💃</span></div>'+
     '<div class="dd-h">🌹 <b>dead_dance</b> — '+esc(e.by||"a circle of lights")+'</div>'+
     '<div class="dd-s">starts in '+when+' · '+(revealed?('📍 '+esc(e.location)):'🔒 location reveals soon — Farrah guides you in')+'</div>'+
   '</div>';
 }).join("");
}
function renderNear(){
 var c=document.getElementById("nearCount"); var today=NEAR.shows.filter(function(s){return s.when===0;}).length;
 if(c)c.textContent=NEAR.loc?String(today||NEAR.shows.length):"··";
 var pn=document.getElementById("nearPanel"); if(!pn)return;
 if(!NEAR.open){pn.style.display="none";return;}
 pn.style.display="block";

 pn.innerHTML='<div class="nh"><span>📍 Tonight &amp; tomorrow · '+esc(locline)+'</span><span class="x" onclick="toggleNear()">✕</span></div>'+
   nearParties()+
   (NEAR.shows.length?NEAR.shows.map(function(s){return '<div class="nearrow" onclick="bandAd(\''+s.id+'\')"><span class="when '+(s.when===0?"today":"tom")+'">'+dayLabel(s.when)+'</span><div class="nm"><b>'+esc(s.band)+'</b><div class="s">'+esc(s.venue)+' · '+esc(s.time)+'</div></div><span class="mi">'+s.dist+' mi</span></div>';}).join(""):'<div class="nearrow"><div class="nm"><b>No shows within 50 miles today.</b><div class="s">The whole country\'s the dance floor — the family\'s always moving.</div></div></div>')+
   '<div class="nf">🛰️ The country is the dance floor — your app knows where you are. <b>Tap a show for the band\'s ad.</b> Demo: placed near you to show the feature; live tour dates wire in once the band feed is cleared.</div>'+
   calBar();
}
function toggleNear(){NEAR.open=!NEAR.open;renderNear();}
function bandAd(id){var s=null;for(var i=0;i<NEAR.shows.length;i++)if(NEAR.shows[i].id===id)s=NEAR.shows[i];if(!s)return;
 AD.track(id,"click");
 document.getElementById("sheet").innerHTML='<h3>🎟️ '+esc(s.band)+'</h3><div class="sb">'+esc(s.venue)+' · '+dayLabel(s.when)+' · '+esc(s.time)+' · '+s.dist+' mi from you</div>'+
  '<div class="draft" style="border-left:3px solid var(--gold)"><div class="tx">'+esc(s.ad)+'</div></div>'+
  '<div class="row" style="gap:8px"><button class="btn gold" style="flex:1" onclick="gate(\'Tickets\')">🎟️ Tickets</button><button class="btn ghost" style="flex:1" onclick="closeModal();toast(\'Drafted to HyperPost — tell the family.\')">📣 Tell the family</button></div>'+
  '<div class="note" style="margin-top:10px">📡 Served by the ad engine — targeted to you by location &amp; date. In production this is the band\'s own promo for this date (their copy, their ticket link); the house just puts it in front of the right heads nearby. No paid auction — editorial placement (paid promotion = disclosure + counsel-gated).</div>'+
  '<button class="close" onclick="closeModal()">Done</button>';
 NEAR.open=false;renderNear();document.getElementById("ovl").classList.add("on");
}
function initNear(){
 function set(lat,lng,fb){NEAR.loc={lat:lat,lng:lng};NEAR.fallback=!!fb;NEAR.shows=genNear(lat,lng);NEAR.shows.forEach(function(s){AD.track(s.id,"view");});if(!NEAR.shown){NEAR.open=true;NEAR.shown=true;}renderNear();}
 try{ if(navigator.geolocation){navigator.geolocation.getCurrentPosition(function(pos){set(pos.coords.latitude,pos.coords.longitude,false);},function(){set(36.9741,-122.0308,true);},{timeout:6000,maximumAge:600000});} else {set(36.9741,-122.0308,true);} }catch(e){set(36.9741,-122.0308,true);}
}
function render(){
 nav();

 var view=document.getElementById("view"),panel=document.getElementById("archivepanel");
 if(S.tab==="archive"){ if(!archiveBuilt)buildArchive(); view.style.display="none"; panel.style.display="block"; return; }
 panel.style.display="none"; view.style.display="block";
 view.innerHTML={home:viewHome,chapters:viewChapters,events:viewEvents,shakedown:viewShakedown,you:viewYou,dash:viewDash}[S.tab]();
}
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(function(){});}
/* a11y: ESC closes any open modal/panel (Claudine: keyboard users were trapped) */
document.addEventListener("keydown",function(e){if(e.key!=="Escape")return;var ov=document.getElementById("ovl");if(ov&&ov.classList.contains("on"))closeModal();else if(typeof NEAR!=="undefined"&&NEAR.open)toggleNear();});
render();
/* welcome TOAST on initial entry — lands them softly and shows where they are */
setTimeout(function(){ toast(WHO ? ("🌹 Welcome home, "+(PROFILE.name.split(/\s+/)[0])+" — this is your page. Make it yours.") : "🌹 Welcome to dead_dance — make it yours."); }, 500);
initNear();
initShare();   /* catch a Web Share Target / shared-link intake */
setInterval(tickCountdowns,1000);   /* live location-reveal countdowns */
</script>
