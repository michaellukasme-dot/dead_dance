var S={tab:(WHO?"you":"home"),liked:{},editBio:false,editId:false,editLand:false,editPhoto:false};
function go(t){S.tab=t;render();window.scrollTo(0,0);}
function toast(m){var t=document.createElement("div");t.className="toast";t.textContent=m;document.body.appendChild(t);setTimeout(function(){t.remove();},2000);}
function esc(x){return String(x==null?"":x).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function gate(what){toast("🔒 "+what+" — counsel-gated in v1 (no real money/accounts yet).");}

var NAV=[["home","Home","🏠"],["chapters","Chapters","🔔"],["events","Shows","📅"],["shakedown","Shakedown","🌹"],["archive","Archive","📼"],["you","You","🪪"]];
function nav(){document.getElementById("nav").innerHTML=NAV.map(function(n){return '<button class="'+(S.tab===n[0]?"on":"")+'" onclick="go(\''+n[0]+'\')"><span class="ni">'+n[2]+'</span>'+n[1]+'</button>';}).join("");}

function feedCard(p,i){return '<div class="card post"><div class="pad"><div class="row"><div class="av" style="background:#ece3f4;color:var(--purple)">'+esc(p.av)+'</div>'+
 '<div style="flex:1"><b>'+esc(p.who)+'</b><div class="muted">'+esc(p.t)+' ago</div></div></div>'+
 '<div style="margin:10px 0 0;font-size:14.5px;line-height:1.5">'+esc(p.txt)+'</div></div>'+
 '<div class="ph">'+esc(p.em)+'</div>'+
 '<div class="pad" style="padding-top:6px"><div class="muted">♥ '+(p.likes+(S.liked[i]?1:0))+' · '+p.c+' comments</div>'+
 '<div class="acts"><button class="'+((p.liked||S.liked[i])?"on":"")+'" onclick="like('+i+')">♥ Like</button><button onclick="toast(\'Comments — demo\')">💬 Comment</button><button onclick="toast(\'Share — demo\')">↪ Share</button></div></div></div>';}
function like(i){S.liked[i]=!S.liked[i];render();}

function viewHome(){
 return '<div class="card"><div class="pad composer"><div class="av" style="background:var(--gold);color:var(--purple)">RG</div>'+
   '<input placeholder="What\'s the word on the lot?" onkeydown="if(event.key===\'Enter\'){toast(\'Posted (demo)\');this.value=\'\'}"><button class="btn sm" onclick="toast(\'Posted (demo)\')">Post</button></div></div>'+
   '<div class="card pad"><div class="row" style="gap:10px"><div class="ic">📥</div><div style="flex:1"><b style="font-size:14px">Bring a Facebook post in</b><div class="muted" style="font-size:12px">Share a post from any FB group into the same group here — in &amp; out.</div></div><button class="btn sm" onclick="captureShare(\'\',\'\')">Share in</button></div></div>'+
   eventsView()+
   sharesView()+
   requestsView()+
   FEED.map(feedCard).join("")+
   '<div class="foot">Free for the family · v1 prototype · demo data · no ads, no tracking.</div>';
}
function viewChapters(){
 var hq=CHAPTERS.filter(function(c){return c.hq;})[0]||CHAPTERS[0];
 var rest=CHAPTERS.filter(function(c){return !c.hq;});
 return '<div class="sec-h">👑 The Founders\' Chapter — Santa Cruz</div>'+
  '<div class="card pad"><div class="row" style="gap:12px"><div class="ic">'+hq.em+'</div><div style="flex:1"><b>'+esc(hq.n)+'</b><div class="muted">'+esc(hq.loc)+' · '+hq.m+' members</div></div><span class="chip ok">HQ</span></div>'+
   '<div class="muted" style="margin:9px 2px 0">King-makers: <b>'+esc(hq.leads||"")+'</b> — they charter the chapters and invite the leaders who carry the flame to their cities.</div>'+
   '<button class="btn gold sm" style="margin-top:11px" onclick="toast(\'Invite a chapter leader — drafted for you to send (v1 mock).\')">Invite a chapter leader</button></div>'+
  '<div class="sec-h">Chapters across the country</div>'+
  '<div class="card list">'+rest.map(function(c){return '<div class="it"><div class="ic">'+c.em+'</div><div class="nm"><b>'+esc(c.n)+'</b><div class="s">'+esc(c.loc)+' · '+c.m+' members</div></div><button class="btn sm ghost" onclick="toast(\'Joined '+esc(c.n)+' (demo)\')">Join</button></div>';}).join("")+'</div>'+
  '<div class="card pad row" style="gap:12px"><div class="ic">🌌</div><div style="flex:1"><b>dead_dance Family (National)</b><div class="muted">All chapters roll up here · the whole bus</div></div><span class="chip purple">Rollup</span></div>'+
  '<div class="note"><b>How the map is drawn:</b> chapters are anchored to where the tribute bands actually tour — the Bay, the Northwest, SoCal, the Rockies (Red Rocks), Texas/SW, the Great Lakes (Chicago), the Southeast (Asheville/Nashville), the Mid-Atlantic, and the Northeast. Kept deliberately few so each one stays a real scene, not a ghost town.</div>'+
  '<div class="note"><b>How chapters earn:</b> when a chapter or vendor sells on Shakedown, dead_dance is the clearing house — a share keeps each local scene self-funding, a founders\' share flows home to Santa Cruz, and the rest runs the platform. <i>Exact splits are drafted for the founders\' sign-off and finalized with counsel; v1 mocks all money.</i></div>';
}
function bandById(id){for(var i=0;i<DD_BANDS.length;i++)if(DD_BANDS[i].id===id)return DD_BANDS[i];return {name:id,link:""};}
function follow(id){var b=bandById(id);b.follow=!b.follow;render();toast(b.follow?("🔔 Tracking "+b.name+" — heads-up when they play near you."):("Stopped tracking "+b.name+"."));}
function viewEvents(){
 if(typeof DD_BANDS==="undefined"||typeof DD_SHOWS==="undefined"){return '<div class="note">Couldn\'t load the band list (bands.js). Reload the page — the rest of dead_dance still works.</div>';}
 var heads=DD_BANDS.filter(function(b){return b.tier==="Headliner";});
 var rest=DD_BANDS.filter(function(b){return b.tier!=="Headliner";});
 var bandCard=function(b){return '<div class="band"><div class="ic">🎸</div><div class="nm"><b>'+esc(b.name)+'</b> <span class="tierpill '+esc(b.tier)+'">'+esc(b.tier)+'</span><div class="s">'+esc(b.note)+'</div></div>'+
   '<div style="display:flex;flex-direction:column;gap:5px"><button class="minib'+(b.follow?' rose':'')+'" onclick="follow(\''+b.id+'\')">'+(b.follow?'🔔 Following':'+ Follow')+'</button><button class="minib" onclick="bookBand()">📅 Book</button><button class="minib" onclick="tipJar()">💚 Tip</button></div></div>';};
 var showCard=function(s,i){var b=bandById(s.bandId);return '<div class="show"><div class="ic">'+(s.near?'📍':'🎟️')+'</div><div class="nm"><b>'+esc(b.name)+'</b>'+(s.near?' <span class="chip rose">near you</span>':'')+(s.real?'':' <span class="chip">representative</span>')+
   '<div class="s">'+esc(s.date)+' · '+esc(s.venue)+' · '+esc(s.city)+', '+esc(s.state)+'</div>'+
   '<div class="acts"><button class="minib" onclick="toast(\'RSVP — see you there! (demo)\')">RSVP</button><button class="minib" onclick="sawShow()">I was there → badge</button><button class="minib rose" onclick="promote('+i+')">🚀 HyperPost</button></div></div></div>';};
 return '<div class="sec-h">🎸 Headliners on tour — follow for local alerts</div>'+
  '<div class="card">'+heads.map(bandCard).join("")+'</div>'+
  '<div class="sec-h">Tonight &amp; near you</div>'+
  '<div class="card">'+DD_SHOWS.map(showCard).join("")+'</div>'+
  '<div class="sec-h">More bands (regional &amp; local)</div>'+
  '<div class="card">'+rest.map(bandCard).join("")+'</div>'+
  '<div class="note"><b>Band data via Compass Rose</b> (<a href="'+esc(DD_SOURCE.url)+'" target="_blank" rel="noopener">gratefuldeadtributebands.com</a>) — '+esc(DD_SOURCE.note)+' We promote bands locally and never sell their music. <b>Live tour-date sync is gated</b> on the source\'s permission/ToS (find-the-owners first, fully credited).</div>';
}
function sawShow(){BADGE.shows++;render();toast("🌹 Show added — your badge now reads "+BADGE.shows+" shows.");}
function addShow(d){sawShow();}

/* PostMind promote — ONE show → curated drafts per surface. JARVIS: drafted, the owner posts. Nothing auto-sends. */
function makePromo(s,b){
 var when=s.date, where=s.venue+", "+s.city+", "+s.state, link=b.link||"";
 return [
  {surface:"dead_dance · Family feed",tx:"🌹 Family — "+b.name+" is playing "+s.venue+" ("+s.city+", "+s.state+") on "+when+". Who's in? Drop a carpool thread below and let's roll a bus. 🚌"},
  {surface:"Local lot / Shakedown board",tx:when+": "+b.name+" @ "+where+". Shakedown opens early — grilled cheese, tapes, art on the lot. Pull in by 5, find the family. 🧀📼"},
  {surface:"Tour-stop announcement (FB event / external)",tx:b.name+" — live "+when+" at "+s.venue+", "+s.city+" "+s.state+". Tickets & info: "+(link||"(band page)")+"\n#GratefulDead #tributeband #deaddance"}
 ];
}
function promote(i){
 var s=DD_SHOWS[i], b=bandById(s.bandId), drafts=makePromo(s,b);
 document.getElementById("sheet").innerHTML='<h3>📣 Promote: '+esc(b.name)+'</h3><div class="sb">'+esc(s.date)+' · '+esc(s.venue)+', '+esc(s.city)+' '+esc(s.state)+' · curated per surface — <b>you post, nothing auto-sends (Jarvis)</b></div>'+
   drafts.map(function(d){return '<div class="draft"><div class="dh">'+esc(d.surface)+'</div><div class="tx">'+esc(d.tx)+'</div><button class="cp" onclick="copyDraft(this)">Copy</button></div>';}).join("")+
   '<div class="note" style="margin:4px 0 0">Honest-state: these are <b>drafts for you to review &amp; post</b> — dead_dance never auto-posts on your behalf, and never sells the band\'s music. Promote locally; respect each surface\'s rules.</div>'+
   '<button class="close" onclick="closeModal()">Done</button>';
 document.getElementById("ovl").classList.add("on");
}
function copyDraft(btn){var tx=btn.parentNode.querySelector(".tx").textContent;try{(navigator.clipboard&&navigator.clipboard.writeText?navigator.clipboard.writeText(tx):Promise.reject()).then(function(){toast("Copied — paste it where you want it.");}).catch(function(){toast("Select & copy the text.");});}catch(e){toast("Select & copy the text.");}}
function closeModal(){document.getElementById("ovl").classList.remove("on");}
function viewShakedown(){
 return '<div class="sec-h">🌹 Shakedown Street · stalls → vendors → The Dealer</div>'+
  DEALERS.map(function(dl){return '<div class="card"><div class="pad row"><div class="ic">'+dl.em+'</div><div style="flex:1"><b>'+esc(dl.n)+'</b><div class="muted">'+esc(dl.kind)+'</div></div><span class="chip'+(dl.kind==="Chapter stall"?"":" purple")+'">'+(dl.kind==="Chapter stall"?"Chapter":dl.kind)+'</span></div>'+
   '<div class="list">'+dl.items.map(function(it){return '<div class="it"><div class="ic">📦</div><div class="nm"><b>'+esc(it[0])+'</b><div class="s">'+esc(dl.n)+'</div></div><div class="row" style="gap:8px"><b style="color:var(--purple)">'+esc(it[1])+'</b><button class="btn sm" onclick="gate(\'Buying from the seller\')">View</button></div></div>';}).join("")+'</div></div>';}).join("")+
  '<div class="note"><b>Lot rules:</b> the deal is between buyer and seller; dead_dance just sets the table and takes the agreed cut. Tapes & art are sold by their makers. <b>No band recordings are sold without a license.</b> All money paths are counsel-gated and mocked in v1.</div>';
}

function hyperDrafts(msg){msg=(msg||"").trim()||"On the lot this weekend — come find the family. 🌹";
 return [
  {s:"dead_dance · Family feed",t:msg+" — see you in the room. 🌹"},
  {s:"Facebook + your chapter subgroups",t:msg+"\n\n(Goes to your timeline AND the chapter groups you run — alongside Facebook, not instead of it.) #GratefulDead #deaddance"},
  {s:"Instagram",t:msg+" ✨🌹\n#gratefuldead #deadhead #shakedownstreet #tiedye #livemusic #santacruz"},
  {s:"TikTok",t:"POV: the family’s back on the lot 🌹 — "+msg+"\n#gratefuldead #deadtok #jamband #santacruz"}
 ];
}
function hyperPost(){
 var ta=document.getElementById("hpMsg"); var drafts=hyperDrafts(ta?ta.value:"");
 var linked=PROFILE.socials.filter(function(x){return x;}).length;
 document.getElementById("sheet").innerHTML='<h3>🚀 HyperPost — one thought, everywhere</h3>'+
  '<div class="sb"><b>Not instead of Facebook</b> — it posts to Facebook <b>and</b> your chapter subgroups, <b>plus</b> Instagram, TikTok, and more. Tailored per place. You press post; nothing auto-sends.</div>'+
  drafts.map(function(d){return '<div class="draft"><div class="dh">'+esc(d.s)+'</div><div class="tx">'+esc(d.t)+'</div><button class="cp" onclick="copyDraft(this)">Copy</button></div>';}).join("")+
