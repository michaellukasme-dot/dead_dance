<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>DeadDance — original human content, distributed</title>
<meta property="og:title" content="Original human content flows through dead.dance">
<meta property="og:description" content="Two-way with Facebook — and out to every network.">
<meta property="og:image" content="https://deaddance.app/stealie_qr.png">
<style>
  :root{--bg:#0a0818;--ink:#fff;--rose:#ff2d6f;}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:radial-gradient(120% 90% at 46% 46%,#160f2e 0%,#0a0818 60%,#060410 100%);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;overflow:hidden}
  #stage{position:fixed;inset:0}
  canvas{position:absolute;inset:0;width:100%;height:100%}
  .hd{position:absolute;top:20px;left:0;right:0;text-align:center;z-index:5;pointer-events:none;padding:0 16px}
  .hd h1{margin:0;font-size:clamp(18px,3.4vw,30px);font-weight:900;letter-spacing:.2px;text-shadow:0 2px 18px #000a}
  .hd p{margin:6px 0 0;font-size:clamp(11px,1.7vw,14px);color:#b9a9e0}
  .node{position:absolute;transform:translate(-50%,-50%);border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;font-weight:800;z-index:3;line-height:1.05;user-select:none;transition:transform .25s ease}
  .node b{font-weight:900}
  .node .sub{font-weight:700;opacity:.9;margin-top:2px}
  .node:hover{transform:translate(-50%,-50%) scale(1.06)}
  .foot{position:absolute;left:22px;bottom:20px;z-index:5;color:#a071ff;font-weight:900;font-size:clamp(11px,1.6vw,14px);text-shadow:0 2px 12px #000}
  .cta{position:absolute;right:20px;bottom:18px;z-index:6;background:linear-gradient(135deg,#b8002e,#5a2e86);color:#fff;font-weight:900;font-size:13px;border:0;border-radius:12px;padding:11px 18px;cursor:pointer;box-shadow:0 8px 24px #0007;text-decoration:none}
</style>
</head>
<body>
<div id="stage">
  <canvas id="c"></canvas>
  <div class="hd">
    <h1>Original human content flows through <span style="color:var(--rose)">dead.dance</span></h1>
    <p>Two-way with Facebook — and out to every network. Planet size ≈ reach.</p>
  </div>
  <div class="foot">original human content ↑</div>
  <a class="cta" href="https://deaddance.app/" rel="noopener">Enter DeadDance ›</a>
</div>
<script>
(function(){
  var stage=document.getElementById('stage'), cv=document.getElementById('c'), ctx=cv.getContext('2d');
  // center + planets in fractional coords (x,y of the box). r = radius px scaled by min(vw,vh).
  var CENTER={x:.46,y:.53};
  var NET=[
    {id:'facebook',label:'Facebook',sub:'the home planet',x:.30,y:.63,r:.115,col:'#1877f2',two:true,txt:'#fff',big:true},
    {id:'instagram',label:'Instagram',x:.615,y:.365,r:.056,col:'linear-gradient(135deg,#f9ce34,#ee2a7b,#6228d7)',txt:'#fff'},
    {id:'snapchat',label:'Snapchat',x:.455,y:.315,r:.040,col:'#fffc00',txt:'#111'},
    {id:'google',label:'Google',sub:'sign-in · SEO',x:.72,y:.335,r:.046,col:'#ffffff',txt:'#1a73e8'},
    {id:'smtp',label:'SMTP',sub:'email',x:.85,y:.40,r:.045,col:'#0f9e8e',txt:'#fff'},
    {id:'youtube',label:'YouTube',x:.775,y:.485,r:.064,col:'#ff0000',txt:'#fff'},
    {id:'sms',label:'SMS',x:.87,y:.565,r:.046,col:'#1db954',txt:'#fff'},
    {id:'x',label:'X',x:.82,y:.655,r:.034,col:'#111',txt:'#fff',ring:'#555'},
    {id:'tiktok',label:'TikTok',x:.675,y:.61,r:.046,col:'#000',txt:'#fff',ring:'#25f4ee'},
    {id:'reddit',label:'Reddit',x:.585,y:.68,r:.040,col:'#ff4500',txt:'#fff'}
  ];
  // build DOM nodes
  function mk(o,isCenter){ var d=document.createElement('div'); d.className='node'; d.dataset.id=o.id;
    d.style.background=o.col||'#fff'; if(o.ring) d.style.boxShadow='0 0 0 2px '+o.ring+', 0 0 40px '+(o.glow||'#0000');
    d.innerHTML='<b style="color:'+(o.txt||'#fff')+'">'+o.label+'</b>'+(o.sub?'<span class="sub" style="color:'+(o.txt||'#fff')+'">'+o.sub+'</span>':'');
    stage.appendChild(d); o.el=d; return d; }
  var center={id:'dead',label:'dead.dance',x:CENTER.x,y:CENTER.y,r:.058,col:'radial-gradient(circle at 40% 35%,#ff5c8a,#c81d63 70%)',txt:'#fff'};
  NET.forEach(function(o){mk(o);}); mk(center,true);
  center.el.innerHTML='<b style="color:#fff">dead.dance</b><span style="font-size:1.4em;margin-top:2px">🌹</span>';

  var W,H,S,cx,cy;
  function layout(){
    W=stage.clientWidth; H=stage.clientHeight; cv.width=W*devicePixelRatio; cv.height=H*devicePixelRatio; ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);
    S=Math.min(W,H); cx=CENTER.x*W; cy=CENTER.y*H;
    function place(o){ var px=o.x*W, py=o.y*H, d=Math.max(28,o.r*S*2);
      o.el.style.left=px+'px'; o.el.style.top=py+'px'; o.el.style.width=d+'px'; o.el.style.height=d+'px';
      o.el.style.fontSize=Math.max(9,o.r*S*0.42*(o.big?1.15:1))+'px';
      o.el.style.boxShadow=(o.ring?('0 0 0 2px '+o.ring+','):'')+'0 0 '+(o.r*S*1.5)+'px '+glow(o)+', inset 0 0 '+(o.r*S*0.6)+'px #ffffff22';
      o.px=px; o.py=py; o.pr=o.r*S; }
    NET.forEach(place); place(center);
  }
  function glow(o){ var m={facebook:'#1877f288',youtube:'#ff000077',reddit:'#ff450077',sms:'#1db95477',instagram:'#ee2a7b77',snapchat:'#fffc0066',smtp:'#0f9e8e77',tiktok:'#25f4ee55',google:'#ffffff55',x:'#88888844',dead:'#ff2d6f99'}; return m[o.id]||'#ffffff33'; }

  // particles along links
  var parts=[]; function spawn(a,b,col,rev){ parts.push({a:a,b:b,t:rev?1:0,sp:(0.006+Math.random()*0.01)*(rev?-1:1),col:col,sz:1.6+Math.random()*1.8}); }
  var tick=0;
  function frame(){
    tick++;
    layoutDirty && layout(); layoutDirty=false;
    ctx.clearRect(0,0,W,H);
    // faint orbit rings
    ctx.save(); ctx.strokeStyle='#ffffff0d'; ctx.lineWidth=1;
    for(var i=1;i<=4;i++){ ctx.beginPath(); ctx.ellipse(cx,cy,S*0.13*i,S*0.11*i,-0.2,0,Math.PI*2); ctx.stroke(); }
    ctx.restore();
    // links (dotted)
    NET.forEach(function(o){ ctx.save(); ctx.strokeStyle=lineCol(o); ctx.lineWidth=o.big?2.4:1.2; ctx.setLineDash([2,7]); ctx.lineDashOffset=-tick*0.6;
      ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(o.px,o.py); ctx.stroke(); ctx.restore(); });
    // content-in line (bottom-left → center)
    var ix=22+40, iy=H-30; ctx.save(); ctx.strokeStyle='#a071ff55'; ctx.lineWidth=2; ctx.setLineDash([2,7]); ctx.lineDashOffset=tick*0.6;
    ctx.beginPath(); ctx.moveTo(ix,iy); ctx.lineTo(cx,cy); ctx.stroke(); ctx.restore();

    // spawn
    if(tick%6===0){ NET.forEach(function(o){ spawn(center,o,lineCol(o)); if(o.two) spawn(o,center,'#3b9bff'); }); spawn({px:ix,py:iy},center,'#a071ff'); }
    // move + draw
    for(var i=parts.length-1;i>=0;i--){ var p=parts[i]; p.t+=p.sp; if(p.t<=0||p.t>=1){ parts.splice(i,1); continue; }
      var x=p.a.px+(p.b.px-p.a.px)*p.t, y=p.a.py+(p.b.py-p.a.py)*p.t;
      ctx.beginPath(); ctx.fillStyle=p.col; ctx.globalAlpha=Math.sin(p.t*Math.PI); ctx.arc(x,y,p.sz,0,Math.PI*2); ctx.fill(); ctx.globalAlpha=1; }
    requestAnimationFrame(frame);
  }
  function lineCol(o){ var m={facebook:'#ff2d6f',instagram:'#ee2a7b',snapchat:'#e6e300',google:'#ffffff',smtp:'#0f9e8e',youtube:'#ff3b3b',sms:'#1db954',x:'#aaaaaa',tiktok:'#25f4ee',reddit:'#ff6a33'}; return m[o.id]||'#ffffff66'; }
  var layoutDirty=true; addEventListener('resize',function(){layoutDirty=true;}); layout(); requestAnimationFrame(frame);
})();
</script>
</body>
</html>
